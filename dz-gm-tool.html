<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D&Z GM Tool</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg-2: #161616;
    --bg-3: #1f1f1f;
    --border: #2a2a2a;
    --border-2: #3a3a3a;
    --text: #d4d4d4;
    --text-dim: #888;
    --text-muted: #5e5e5e;
    --accent: #c84a1f;
    --accent-2: #e86a3f;
    --danger: #c0392b;
    --warn: #d4a73a;
    --success: #58a558;
    --info: #3a89c4;
    --gm: #6a4a8c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; line-height: 1.45; }
  button { font-family: inherit; font-size: inherit; }
  input, select, textarea {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 4px 6px; font-family: inherit; font-size: inherit; border-radius: 2px;
  }
  input:focus, select:focus, textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  input[type=number] { width: 60px; }
  input[type=number].small { width: 42px; }
  input[type=number].tiny { width: 36px; padding: 2px 4px; }
  button {
    background: var(--bg-3); color: var(--text); border: 1px solid var(--border-2);
    padding: 4px 10px; cursor: pointer; border-radius: 2px;
  }
  button:hover { background: var(--border); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  button.danger { color: var(--danger); border-color: var(--danger); }
  button.danger:hover { background: var(--danger); color: #fff; }
  button.small { padding: 2px 6px; font-size: 11px; }
  button.roll { padding: 2px 6px; font-size: 11px; background: var(--bg-2);
    border-color: var(--border-2); color: var(--accent-2); }
  button.roll:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Layout */
  header {
    background: var(--bg-2); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 14px; letter-spacing: 1px; color: var(--accent-2); }
  header h1 .sub { color: var(--text-muted); font-weight: normal; margin-left: 8px; }
  .header-controls { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .header-controls label { color: var(--text-dim); cursor: pointer; }

  nav.tabs {
    display: flex; gap: 0; background: var(--bg-2); border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }
  nav.tabs button {
    background: transparent; border: none; border-bottom: 2px solid transparent;
    padding: 8px 14px; color: var(--text-dim); border-radius: 0; font-size: 12px;
  }
  nav.tabs button:hover { background: var(--bg-3); color: var(--text); }
  nav.tabs button.active { color: var(--accent-2); border-bottom-color: var(--accent); }

  main { padding: 12px 16px 80px; }
  section.tab { display: none; }
  section.tab.active { display: block; }

  /* Last roll bar */
  #last-roll-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-2);
    border-top: 1px solid var(--border); padding: 6px 16px; display: flex;
    align-items: center; gap: 12px; font-size: 12px; z-index: 50;
  }
  #last-roll-bar .label { color: var(--text-muted); }
  #last-roll-bar .summary { color: var(--text); flex: 1; }
  #last-roll-bar .summary .accent { color: var(--accent-2); font-weight: bold; }
  #last-roll-bar .summary .dim { color: var(--text-dim); }
  #last-roll-bar .target-select { display: flex; align-items: center; gap: 6px; }

  /* Cards & panels */
  .card {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 3px; padding: 10px 12px; margin-bottom: 10px;
  }
  .card h2 { margin: 0 0 8px; font-size: 13px; color: var(--accent-2); letter-spacing: 0.5px; }
  .card h3 { margin: 0 0 6px; font-size: 12px; color: var(--text); letter-spacing: 0.3px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row.tight { gap: 4px; }
  .row.spaced { gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-firearms { display: grid; grid-template-columns: 320px 1fr; gap: 12px; }
  .grid-roster { display: grid; grid-template-columns: 1fr; gap: 8px; }
  label.field { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: var(--text-dim); }
  label.field input, label.field select { width: 100%; }
  label.inline { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); }
  .muted { color: var(--text-dim); }
  .small-text { font-size: 11px; }
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* Combatant rows */
  .combatant {
    background: var(--bg-3); border: 1px solid var(--border); border-left: 3px solid var(--border-2);
    padding: 8px 10px; border-radius: 2px;
  }
  .combatant.pc { border-left-color: var(--info); }
  .combatant.npc { border-left-color: var(--accent); }
  .combatant.active-turn { border-left-color: var(--success); border-left-width: 5px; }
  .combatant.unconscious { opacity: 0.55; }
  .combatant-header { display: flex; align-items: center; gap: 8px; }
  .combatant-name { font-weight: bold; color: var(--text); flex: 1; }
  .combatant-name input { background: transparent; border: 1px solid transparent; font-weight: bold; padding: 2px 4px; width: 180px; }
  .combatant-name input:hover { border-color: var(--border); }
  .hp-display { color: var(--text); font-weight: bold; }
  .hp-display.low { color: var(--warn); }
  .hp-display.critical { color: var(--danger); }
  .stat-pill {
    display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 2px; font-size: 11px;
  }
  .stat-pill .label { color: var(--text-muted); }
  .combatant-body { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: none; }
  .combatant.expanded .combatant-body { display: block; }
  .combatant-toggle { color: var(--text-dim); cursor: pointer; user-select: none; }

  .gm-only { display: none; }
  body.gm-mode .gm-only { display: inline-flex; }
  body.gm-mode .gm-only-block { display: block; }
  .gm-only-block { display: none; }
  .gm-pill { background: rgba(106,74,140,0.2); border-color: var(--gm); color: #b89bd6; }

  /* Library lists */
  .lib-list { display: flex; flex-direction: column; gap: 2px; max-height: 600px; overflow-y: auto; padding-right: 4px; }
  .lib-item {
    background: var(--bg-3); border: 1px solid var(--border); padding: 6px 8px;
    cursor: pointer; border-radius: 2px;
  }
  .lib-item:hover { border-color: var(--border-2); }
  .lib-item.selected { border-color: var(--accent); background: rgba(200,74,31,0.1); }
  .lib-item .lib-name { font-weight: bold; color: var(--text); }
  .lib-item .lib-meta { color: var(--text-dim); font-size: 11px; }
  .lib-filter { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; }
  .lib-filter button { font-size: 11px; padding: 2px 8px; }
  .lib-filter button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Tooltips */
  [data-tip] { position: relative; cursor: help; border-bottom: 1px dotted var(--text-muted); }
  [data-tip]:hover::after {
    content: attr(data-tip); position: absolute; bottom: 100%; left: 0;
    background: #000; color: var(--text); border: 1px solid var(--accent);
    padding: 6px 8px; font-size: 11px; line-height: 1.4; width: 280px; z-index: 100;
    border-radius: 2px; margin-bottom: 4px; white-space: pre-wrap;
  }

  /* Roll output */
  .roll-result {
    background: var(--bg); border: 1px solid var(--border); padding: 8px 10px;
    border-radius: 2px; font-size: 12px; margin-top: 6px;
  }
  .roll-result .total { color: var(--accent-2); font-weight: bold; font-size: 16px; }
  .roll-result .breakdown { color: var(--text-dim); font-size: 11px; }
  .roll-result.crit { border-color: var(--success); }
  .roll-result.crit .total { color: var(--success); }
  .roll-result.fail { border-color: var(--danger); }
  .roll-result.fail .total { color: var(--danger); }
  .roll-result.warn { border-color: var(--warn); }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: var(--bg-2); border: 1px solid var(--accent); border-radius: 3px;
    padding: 16px; max-width: 540px; width: 90vw; max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 12px; color: var(--accent-2); font-size: 14px; }
  .modal .modal-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }

  /* Reference tab */
  .ref-section { background: var(--bg-2); border: 1px solid var(--border); padding: 10px 14px;
    margin-bottom: 8px; border-radius: 3px; }
  .ref-section h3 { color: var(--accent-2); margin: 0 0 6px; font-size: 13px; }
  .ref-section h4 { color: var(--text); margin: 8px 0 4px; font-size: 12px; }
  .ref-section table { width: 100%; border-collapse: collapse; margin: 6px 0; }
  .ref-section th, .ref-section td { padding: 4px 8px; border: 1px solid var(--border); text-align: left; font-size: 11px; }
  .ref-section th { background: var(--bg-3); color: var(--accent-2); }
  .ref-section .rule { color: var(--text-dim); font-size: 12px; margin-bottom: 6px; }

  /* Inputs that accept either number or roll */
  .roll-input { display: flex; align-items: center; gap: 4px; }
  .roll-input input { width: 60px; }
  .roll-input.wide input { width: 72px; }

  /* Property tags */
  .prop-tag {
    display: inline-block; padding: 1px 6px; background: var(--bg-3);
    border: 1px solid var(--border); border-radius: 2px; font-size: 10px;
    color: var(--text-dim); margin-right: 3px; margin-bottom: 2px;
  }
  .prop-tag.featured { color: var(--accent-2); border-color: var(--accent); }

  /* Conditions list */
  .cond-tag {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px;
    background: rgba(212,167,58,0.15); border: 1px solid var(--warn); border-radius: 2px;
    font-size: 11px; color: var(--warn); margin-right: 4px;
  }
  .cond-tag button { padding: 0 4px; font-size: 10px; background: none; border: none; color: var(--warn); }

  /* HP bar */
  .hp-bar { width: 80px; height: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .hp-bar .fill { height: 100%; background: var(--success); transition: width 0.2s; }
  .hp-bar .fill.low { background: var(--warn); }
  .hp-bar .fill.critical { background: var(--danger); }

  /* Help icon */
  .help-ico {
    display: inline-block; width: 14px; height: 14px; line-height: 14px; text-align: center;
    background: var(--bg-3); border: 1px solid var(--border-2); border-radius: 50%;
    color: var(--text-dim); font-size: 10px; cursor: help; margin-left: 4px;
  }
  .help-ico:hover { color: var(--accent-2); border-color: var(--accent); }

  hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .empty-state { color: var(--text-muted); padding: 24px; text-align: center; font-style: italic; }

  /* Type-specific firearm headers */
  .firearm-type-AR { color: #d4a73a; }
  .firearm-type-SMG { color: #d4a73a; }
  .firearm-type-Handgun { color: #58a558; }
  .firearm-type-Shotgun { color: #c84a1f; }
  .firearm-type-LongRifle { color: #3a89c4; }
  .firearm-type-Martial { color: #b89bd6; }

  details summary { cursor: pointer; padding: 4px 0; color: var(--text-dim); }
  details summary:hover { color: var(--text); }
  details[open] summary { color: var(--accent-2); }

  .toast {
    position: fixed; top: 60px; right: 16px; background: var(--bg-2);
    border: 1px solid var(--accent); padding: 8px 12px; border-radius: 2px;
    z-index: 300; box-shadow: 0 2px 8px rgba(0,0,0,0.5); font-size: 12px;
    animation: slide-in 0.2s ease-out;
  }
  @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Action economy */
  .economy-bar {
    margin-top: 6px; padding: 6px 8px; background: rgba(88, 165, 88, 0.07);
    border: 1px solid var(--success); border-radius: 2px;
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  }
  .econ-label { color: var(--success); font-size: 10px; letter-spacing: 1px; margin-right: 4px; }
  .econ-pill {
    background: var(--bg); border: 1px solid var(--border-2); padding: 2px 8px;
    font-size: 11px; cursor: pointer; border-radius: 2px; color: var(--text);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .econ-pill:hover { border-color: var(--success); }
  .econ-pill.econ-used { background: var(--bg-3); color: var(--text-muted); text-decoration: line-through; border-color: var(--border); }
  .econ-pill.econ-avail { color: var(--success); border-color: var(--success); }
  .econ-pill.econ-held { background: rgba(212,167,58,0.15); border-color: var(--warn); color: var(--warn); animation: held-pulse 2.5s ease-in-out infinite; }
  .econ-pill.econ-reserved { background: rgba(212,167,58,0.07); border-color: var(--warn); color: var(--text-muted); font-style: italic; }
  @keyframes held-pulse { 0%, 100% { box-shadow: 0 0 0 rgba(212,167,58,0); } 50% { box-shadow: 0 0 6px rgba(212,167,58,0.5); } }

  /* Help panel */
  .help-panel { background: rgba(58, 137, 196, 0.07); border-color: var(--info); }
  .help-panel summary { color: var(--info); }
  .help-text { font-size: 12px; line-height: 1.6; color: var(--text); }
  .help-text p { margin: 6px 0; }
  .help-text code { background: var(--bg); padding: 1px 4px; border-radius: 2px; color: var(--accent-2); font-size: 11px; }
  .help-text kbd { background: var(--bg); padding: 1px 6px; border: 1px solid var(--border-2); border-radius: 2px; font-size: 10px; }

  /* Burst panel */
  .burst-row { display: flex; gap: 6px; align-items: center; margin: 3px 0; padding: 4px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; }
  .burst-row.disadv { border-left: 3px solid var(--warn); }
  .burst-row.hit { border-left: 3px solid var(--success); }
  .burst-row.miss { border-left: 3px solid var(--danger); }
  .burst-row .shot-num { color: var(--text-muted); font-size: 11px; min-width: 50px; }
  .burst-row .shot-tag { font-size: 10px; padding: 1px 5px; border-radius: 2px; }
  .burst-row .shot-tag.disadv { background: rgba(212,167,58,0.2); color: var(--warn); }
  .burst-row .shot-tag.penalty { background: rgba(192,57,43,0.2); color: var(--danger); }

  /* Narrative */
  .narrative { background: var(--bg); border-left: 3px solid var(--accent); padding: 6px 10px; margin-top: 6px;
    font-style: italic; color: var(--text); font-size: 12px; line-height: 1.5; }

  /* Editable reference */
  .ref-edit-btn { float: right; font-size: 10px; padding: 1px 6px; }
  .ref-section.editing textarea { width: 100%; min-height: 200px; font-family: monospace; }
</style>
</head>
<body>
<header>
  <h1>D&Z GM TOOL <span class="sub">v1</span></h1>
  <div class="header-controls">
    <label><input type="checkbox" id="gm-mode-toggle"> GM Fields</label>
    <button class="small" onclick="exportData()">Export</button>
    <button class="small" onclick="document.getElementById('import-file').click()">Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="small danger" onclick="resetAllData()">Reset</button>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="roster" class="active">Roster &amp; Initiative</button>
  <button data-tab="firearms">Firearms</button>
  <button data-tab="melee">Melee &amp; Thrown</button>
  <button data-tab="dc">DC Check</button>
  <button data-tab="bestiary">Bestiary</button>
  <button data-tab="reference">Reference</button>
</nav>

<main>
  <section id="tab-roster" class="tab active"></section>
  <section id="tab-firearms" class="tab"></section>
  <section id="tab-melee" class="tab"></section>
  <section id="tab-dc" class="tab"></section>
  <section id="tab-bestiary" class="tab"></section>
  <section id="tab-reference" class="tab"></section>
</main>

<div id="last-roll-bar">
  <span class="label">LAST ROLL:</span>
  <span class="summary" id="last-roll-summary"><span class="dim">— no rolls yet —</span></span>
  <span class="target-select" id="last-roll-actions"></span>
</div>

<div class="modal-bg" id="modal"><div class="modal" id="modal-inner"></div></div>

<script src="storage-polyfill.js"></script>
<script>
/* ============================================================
   D&Z GM TOOL — ALL DATA AND LOGIC
   ============================================================ */

/* ===== FIREARM TYPE INFO (sound, ammo) ===== */
const FIREARM_TYPES = {
  AR:        { label: 'Assault Rifle',  ammo: 'Medium',       soundFt: 500,
               note: 'Creates a sound that echoes 500 ft. when fired.' },
  SMG:       { label: 'SMG',            ammo: 'Small/Medium', soundFt: 350,
               note: 'Creates a sound that echoes 350 ft. when fired.' },
  Handgun:   { label: 'Handgun',        ammo: 'Small',        soundFt: 300,
               note: 'Creates a sound that echoes 300 ft. when fired.' },
  Shotgun:   { label: 'Shotgun',        ammo: 'Shotgun Shell', soundFt: 500,
               note: 'Echo 500 ft. Attacks in cones (not single target). All in cone make a Dex save, half on success. Bullets through surfaces deal half damage to things behind.' },
  LongRifle: { label: 'Long-Range Rifle', ammo: 'Large',      soundFt: 500,
               note: 'Creates a sound that echoes 500 ft. when fired.' },
  Martial:   { label: 'Martial Firearm', ammo: 'Special',     soundFt: 500,
               note: 'Specialized weapons (RPGs, grenade launchers, flamethrowers, etc.) requiring specific training.' }
};

/* ===== FIREARM PROPERTY DESCRIPTIONS (full rule text for tooltips/reference) ===== */
const PROPERTY_INFO = {
  'Automatic': "Firing this weapon releases a barrage of bullets. Decide on an amount of bullets you want to spend firing, up to the amount available. If you're proficient with the weapon type, halfway through firing the amount of bullets, you can decide to stop. The first 5 attacks have disadvantage, and every attack you miss inflicts a -2 to hit on all future attack rolls AFTER the first 5 (only this usage). You can spend a maximum bullet amount equal to the number in parenthesis. You can only use the automatic property once every other turn.",
  'Simple': "Proficiency bonus is added to your attack rolls to weapons with this trait regardless of experience.",
  'Concealable': "This weapon can be easily hidden or disguised. Advantage on Sleight of Hand (with prof) and Stealth (no prof needed) checks to hide it on your person, elsewhere, or to disguise it as another object.",
  'Light': "When wielding a light weapon in one hand with the other empty, and you take the attack action with the light weapon or make an unarmed strike, you can make an attack with the other as a bonus action.",
  'Forceful': "The number in parenthesis takes away from your hit rolls with this weapon. Additionally, if (the number + 1d6) exceeds your proficiency bonus + Strength modifier, the gun flies out of your hands.",
  'Pump': "After each shot, you must trigger the pump of this weapon before using it again. It is a bonus action to trigger the pump.",
  'Two-Handed': "This weapon requires two hands to wield.",
  'Weakening Range': "The defined value in parenthesis defines a distance in feet. For each one of these distances that the target is away from you, decrease the amount of damage dice rolled by 1.",
  'Reliable': "This weapon does not misfire and ignores any effects that would cause it to misfire.",
  'Makeshift': "When a player or creature OTHER than the Designer rolls a critical fail attacking with this weapon: roll a d20 (DC 10). On success (firearm), it misfires; on failure, the weapon breaks and becomes irreparable. If the wielder IS the Designer, treat this as Custom instead.",
  'Custom': "Assigned to a specific creature. While being used by its assigned wielder, the weapon gains Reliable, and the wielder is considered proficient with it. If also Makeshift, and the wielder is the Designer, it cannot become irreparable on a critical failure (instead becomes broken).",
  'Finesse': "You can use Strength or Dexterity modifier for attack and damage rolls. Use the same chosen modifier for both.",
  'Splintering': "If you deal damage in one attack equal to the number in parenthesis or more, the weapon explodes into shards. All within 5 ft. of the target make a Dex save (DC = damage dealt) or take that damage as piercing. You don't make the Dex save but make a Con save (same DC). Failure stuns you until end of next turn (with half movement instead of 0).",
  'Impalation': "On hit, you may leave the weapon inside the target. At the start of each of their turns, they take damage equal to the weapon's damage dice. Repeats for 2d4 turns, or until a creature spends a bonus action to remove it (Strength check vs DC 10 + your Str mod). When removed, the creature takes 1 damage until the wound is covered, packed, or stitched.",
  'Severing': "This weapon gets past most worn equipment that isn't metal. When you hit a creature by 5 over their AC, they gain a 1st level Bleeding condition (or +1 Bleeding level). Critical hits with Severing inflict Bleeding regardless of AC buffer.",
  'Ammunition': "This weapon requires another item to make its ranged attack. Reloads as part of the bonus action to equip the item, if equippable as a bonus action.",
  'Prerequisite': "This weapon or item cannot be used or equipped unless you meet the listed requirements.",
  'Defensive': "Wielding this weapon grants +AC equal to the number in parenthesis (default +1) while held and not stowed.",
  'Versatile': "When wielded with two hands, this weapon's damage die changes to the value in parenthesis. Free action to switch grip.",
  'Reach': "This weapon's reach extends to the distance in parenthesis (vs the default 5 ft.) for melee attacks and opportunity attacks.",
  'Heavy': "This weapon is unwieldy. Small or smaller creatures suffer disadvantage on attack rolls with it.",
  'Stealthy': "Attacks made with this weapon do not produce sound that would alert enemies beyond an immediately adjacent space. Advantage on Stealth checks made while attacking.",
  'Thrown': "Can be thrown as a ranged attack at the range in parenthesis (normal/max). Uses Strength for thrown attacks (or Dex if also Finesse)."
};

/* ===== AMMO TYPES ===== */

const STORAGE_KEY = 'dz-gm-tool-v1';

let state = {
  // ... (polyfill handles storage)
  combatants: [],   // PCs and NPCs alike
  firearmLib: [],   // user-customized library (presets are merged in for display)
  customFirearms: [], // truly custom additions only — saved/loaded
  customMelee: [],    // user's custom melee weapons
  customBestiary: [], // user's custom bestiary entries
  referenceOverrides: {}, // { sectionId: html }
  lastRoll: null,
  activeTurn: null,
  round: 1,
  uiSelectedFirearm: null,
  uiSelectedMelee: null,
  uiFirearmFilter: 'all',
  uiMeleeFilter: 'all',
  uiBestiaryFilter: 'all',
  gmMode: false,
  burstState: null  // for automatic-burst per-shot resolution
};

function uuid() { return 'id_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); }

async function loadState() {
  dzStorage.migrate();
  try {
    const res = await dzStorage.get([STORAGE_KEY]);
    if (res[STORAGE_KEY]) {
      Object.assign(state, res[STORAGE_KEY]);
    }
  } catch (e) { console.warn('Failed to load state:', e); }
  // Migrate any old-format combatants
  (state.combatants || []).forEach(c => normalizeEconomy(c));
  document.body.classList.toggle('gm-mode', !!state.gmMode);
  document.getElementById('gm-mode-toggle').checked = !!state.gmMode;
}

async function saveState() {
  try { 
    await dzStorage.set({[STORAGE_KEY]: state}); 
    if (window.obrState?.connected && window.obrState.role === 'GM') {
      pushToOBRDebounced();
    }
  } catch (e) { console.warn('Failed to save state:', e); }
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'dz-campaign-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported.');
}

function importData(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const loaded = JSON.parse(e.target.result);
      Object.assign(state, loaded);
      saveState();
      renderAll();
      toast('Imported.');
    } catch (err) { alert('Import failed: ' + err.message); }
  };
  reader.readAsText(f);
  ev.target.value = '';
}

function resetAllData() {
  if (!confirm('Reset ALL data? This cannot be undone. Consider Export first.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

/* ============================================================
   DICE
   ============================================================ */
function rollDie(sides) { return Math.floor(Math.random() * sides) + 1; }

// Parse "1d6+2" or "2d4" or "1d20" into rolls
function rollNotation(notation) {
  const match = String(notation).replace(/\s/g, '').match(/^(\d+)d(\d+)([+-]\d+)?$/);
  if (!match) return { total: 0, rolls: [], bonus: 0, error: 'Bad notation' };
  const count = parseInt(match[1]);
  const sides = parseInt(match[2]);
  const bonus = match[3] ? parseInt(match[3]) : 0;
  const rolls = [];
  for (let i = 0; i < count; i++) rolls.push(rollDie(sides));
  return { total: rolls.reduce((a,b)=>a+b,0) + bonus, rolls, bonus, count, sides };
}

function rollD20(adv = 'normal') {
  if (adv === 'normal') return { value: rollDie(20), rolls: null };
  const a = rollDie(20), b = rollDie(20);
  const value = adv === 'adv' ? Math.max(a, b) : Math.min(a, b);
  return { value, rolls: [a, b] };
}

/* ============================================================
   MODAL & TABS
   ============================================================ */
function openModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

function setupTabs() {
  document.querySelectorAll('#tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('section.tab').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}

document.getElementById('gm-mode-toggle').addEventListener('change', e => {
  state.gmMode = e.target.checked;
  document.body.classList.toggle('gm-mode', state.gmMode);
  saveState();
  renderAll();
});

/* ============================================================
   LAST ROLL TRACKING
   ============================================================ */
function setLastRoll(roll) {
  state.lastRoll = roll;
  saveState();
  renderLastRoll();
}

function renderLastRoll() {
  const sum = document.getElementById('last-roll-summary');
  const acts = document.getElementById('last-roll-actions');
  if (!state.lastRoll) {
    sum.innerHTML = '<span class="dim">— no rolls yet —</span>';
    acts.innerHTML = '';
    return;
  }
  const r = state.lastRoll;
  let summary = '';
  if (r.kind === 'attack') {
    summary = `<span class="dim">${r.source}:</span> Attack <span class="accent">${r.attack}</span>`;
    if (r.damage != null) summary += ` <span class="dim">→</span> Damage <span class="accent">${r.damage}</span> ${r.damageType||''}`;
    if (r.crit) summary += ' <span style="color:var(--success)">[CRIT]</span>';
    if (r.misfire) summary += ' <span style="color:var(--danger)">[MISFIRE]</span>';
  } else if (r.kind === 'damage') {
    summary = `<span class="dim">${r.source}:</span> <span class="accent">${r.damage}</span> ${r.damageType||'damage'}`;
  } else if (r.kind === 'check') {
    summary = `<span class="dim">${r.source}:</span> <span class="accent">${r.value}</span> vs DC ${r.dc} → ${r.success ? 'SUCCESS' : 'FAIL'}`;
  } else if (r.kind === 'misc') {
    summary = `<span class="dim">${r.source}:</span> <span class="accent">${r.value}</span>`;
  }
  sum.innerHTML = summary;

  if (r.damage != null && state.combatants.length > 0) {
    const opts = state.combatants.map(c => `<option value="${c.id}">${escapeHtml(c.name)} (${c.hp.current}/${c.hp.max})</option>`).join('');
    acts.innerHTML = `<select id="lr-target"><option value="">apply to…</option>${opts}</select>
      <button class="small primary" onclick="applyLastDamage()">Apply</button>`;
  } else {
    acts.innerHTML = '';
  }
}

function applyLastDamage() {
  const targetId = document.getElementById('lr-target').value;
  if (!targetId || !state.lastRoll || state.lastRoll.damage == null) return;
  const c = state.combatants.find(x => x.id === targetId);
  if (!c) return;
  c.hp.current = Math.max(0, c.hp.current - state.lastRoll.damage);
  saveState();
  renderRoster();
  renderLastRoll();
  toast(`Applied ${state.lastRoll.damage} damage to ${c.name}`);
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   ROSTER & INITIATIVE
   ============================================================ */
function makeBlankCombatant(type) {
  return {
    id: uuid(),
    type: type, // 'pc' | 'npc'
    name: type === 'pc' ? 'New PC' : 'New NPC',
    initiative: 0,
    hp: { current: 10, max: 10 },
    ac: 10,
    speed: 25,
    expanded: true,
    bodyType: type === 'pc' ? 'Average' : '',
    role: '', background: '',
    abilities: { Str: 10, Dex: 10, Con: 10, Int: 10, Wis: 10, Cha: 10 },
    profBonus: 2,
    bloodPoints: { current: 8, max: 8 },
    insanity: 0,
    infectionPoints: 0,    // GM-only
    bloodType: '',         // GM-only
    conditions: [],
    ammo: { Small: 0, Medium: 0, Large: 0, Shotgun: 0, Rocket: 0, Special: 0 },
    weapons: [],           // [{firearmId, currentMag, ammoLoaded}]
    notes: '',
    economy: defaultEconomy(),
    autoUsedThisTurn: false  // automatic property (once per other turn)
  };
}

function defaultEconomy() {
  return {
    action: { used: false, label: '', held: false, trigger: '' },
    bonus: { used: false, label: '' },
    reaction: { used: false, label: '' },
    interaction: { used: false, label: '' },
    moveUsed: 0
  };
}

function normalizeEconomy(c) {
  if (!c.economy) { c.economy = defaultEconomy(); return; }
  ['action','bonus','reaction','interaction'].forEach(k => {
    const v = c.economy[k];
    if (typeof v === 'boolean') {
      c.economy[k] = { used: v, label: '' };
    } else if (!v || typeof v !== 'object') {
      c.economy[k] = { used: false, label: '' };
    }
  });
  if (typeof c.economy.action.held !== 'boolean') c.economy.action.held = false;
  if (c.economy.action.trigger == null) c.economy.action.trigger = '';
  if (c.economy.moveUsed == null) c.economy.moveUsed = 0;
}

function resetEconomy(c) {
  c.economy = defaultEconomy();
  c.autoUsedThisTurn = false;
}

function editEconomy(id, slotKey) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  const slot = c.economy[slotKey];
  const slotName = slotKey === 'interaction' ? 'Free Interaction' : (slotKey.charAt(0).toUpperCase() + slotKey.slice(1));

  // Special: Reaction is reserved by a held action — show trigger/cancel options
  if (slotKey === 'reaction' && c.economy.action.held && !c.economy.reaction.used) {
    openModal(`
      <h2>Reaction — Reserved by Held Action</h2>
      <div class="muted small-text">${escapeHtml(c.name)}'s reaction is reserved.</div>
      <div style="margin:8px 0; padding:8px; background:rgba(212,167,58,0.1); border-left:3px solid var(--warn)">
        <div><strong>Held action:</strong> ${escapeHtml(c.economy.action.label || '(unspecified)')}</div>
        <div><strong>Trigger:</strong> ${escapeHtml(c.economy.action.trigger || '(unspecified)')}</div>
      </div>
      <label class="field"><span>What was the result when triggered? <span class="muted">(optional)</span></span>
        <input id="ec-result" placeholder="e.g., Shot the walker as it crossed the threshold">
      </label>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="cancelHeldAction('${id}'); closeModal();" data-tip="Discard the held action — reaction freed but action this turn is lost (per RAW)">Discard Held Action</button>
        <button class="primary" onclick="(function(){var v=document.getElementById('ec-result').value; triggerHeldAction('${id}', v); closeModal();})()">Trigger It Now</button>
      </div>
    `);
    return;
  }

  let actionExtras = '';
  if (slotKey === 'action') {
    actionExtras = `
      <label class="inline" style="margin-top:10px">
        <input type="checkbox" id="ec-hold" ${slot.held?'checked':''}
               onchange="document.getElementById('ec-hold-fields').style.display = this.checked ? 'block' : 'none'">
        <strong style="color:var(--warn)">Hold / Ready this action</strong>
        <span class="muted small-text" style="margin-left:6px">(reserves Reaction; triggers when condition fires)</span>
      </label>
      <div id="ec-hold-fields" style="display:${slot.held?'block':'none'}; margin-top:6px; padding:8px; background:rgba(212,167,58,0.07); border-left:3px solid var(--warn)">
        <label class="field"><span>Trigger condition</span>
          <input id="ec-trigger" value="${escapeHtml(slot.trigger||'')}" placeholder="e.g., When a walker comes within 10 ft, or If the door opens">
        </label>
        <div class="muted small-text" style="margin-top:6px">When the trigger fires (before your next turn), the held action resolves and consumes your reaction. If the trigger never fires, the action is lost.</div>
      </div>
    `;
  }

  const placeholder = slotKey === 'action'
    ? "e.g., Shot at clicker with AR-15"
    : (slotKey === 'bonus'
      ? "e.g., Pumped shotgun, drew machete"
      : (slotKey === 'reaction'
        ? "e.g., Opportunity attack on walker"
        : "e.g., Opened door, brief shout"));

  openModal(`
    <h2>${slotName} — ${escapeHtml(c.name)}</h2>
    <label class="field"><span>What did you do? <span class="muted">(optional but helpful)</span></span>
      <input id="ec-label" value="${escapeHtml(slot.label||'')}" placeholder="${placeholder}" autofocus>
    </label>
    ${actionExtras}
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      ${(slot.used || slot.held) ? `<button onclick="clearEconomySlot('${id}','${slotKey}'); closeModal();" data-tip="Mark this slot unused — undoes the action">Clear (Unused)</button>` : ''}
      <button class="primary" onclick="saveEconomyEdit('${id}','${slotKey}', ${slotKey==='action'})">Save</button>
    </div>
  `);
}

function saveEconomyEdit(id, slotKey, isAction) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  const label = document.getElementById('ec-label').value || '';
  if (isAction) {
    const hold = document.getElementById('ec-hold').checked;
    const trigger = document.getElementById('ec-trigger')?.value || '';
    c.economy.action.label = label;
    c.economy.action.held = hold;
    c.economy.action.trigger = trigger;
    c.economy.action.used = true; // action is always spent (held or actually used)
  } else {
    c.economy[slotKey].used = true;
    c.economy[slotKey].label = label;
  }
  saveState();
  closeModal();
  renderRoster();
}

function clearEconomySlot(id, slotKey) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  if (slotKey === 'action') {
    c.economy.action = { used: false, label: '', held: false, trigger: '' };
  } else {
    c.economy[slotKey] = { used: false, label: '' };
  }
  saveState();
  renderRoster();
}

function triggerHeldAction(id, resultLabel) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  c.economy.reaction.used = true;
  c.economy.reaction.label = resultLabel || ('Triggered: ' + (c.economy.action.label || 'held action'));
  c.economy.action.held = false;
  saveState();
  renderRoster();
  toast('Held action triggered.');
}

function cancelHeldAction(id) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  c.economy.action.held = false;
  // Action stays used (lost per RAW); reaction is freed
  saveState();
  renderRoster();
  toast('Held action discarded — reaction freed.');
}

function setMoveUsed(id, val) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  normalizeEconomy(c);
  c.economy.moveUsed = Math.max(0, parseInt(val)||0);
  saveState();
}

function addCombatant(type) {
  const c = makeBlankCombatant(type);
  state.combatants.push(c);
  saveState();
  renderRoster();
}

function addBestiaryCombatant(presetId) {
  const p = BESTIARY_PRESETS.find(b => b.id === presetId);
  if (!p) return;
  const existing = state.combatants.filter(c => c.name.startsWith(p.name)).length;
  const c = makeBlankCombatant('npc');
  c.name = p.name + (existing > 0 ? ' ' + (existing + 1) : '');
  c.hp = { current: p.hp, max: p.hp };
  c.ac = p.ac;
  c.speed = p.speed;
  c.notes = p.notes;
  c.bestiaryRef = p.id;
  c.expanded = false;
  state.combatants.push(c);
  saveState();
  renderRoster();
  toast('Added ' + c.name);
}

function removeCombatant(id) {
  state.combatants = state.combatants.filter(c => c.id !== id);
  if (state.activeTurn === id) state.activeTurn = null;
  saveState();
  renderRoster();
  renderLastRoll();
}

function updateCombatant(id, path, value) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  const parts = path.split('.');
  let target = c;
  for (let i = 0; i < parts.length - 1; i++) target = target[parts[i]];
  // numeric coercion if numeric
  if (typeof target[parts[parts.length-1]] === 'number') value = parseInt(value) || 0;
  target[parts[parts.length-1]] = value;
  saveState();
}

function rollInitiativeFor(id) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  const dexMod = abilityMod(c.abilities?.Dex ?? 10);
  const r = rollD20();
  c.initiative = r.value + dexMod;
  saveState();
  renderRoster();
  setLastRoll({ kind: 'misc', source: c.name + ' Init', value: r.value + dexMod });
}

function sortByInitiative() {
  state.combatants.sort((a, b) => b.initiative - a.initiative);
  saveState();
  renderRoster();
}

function nextTurn() {
  if (state.combatants.length === 0) return;
  const idx = state.combatants.findIndex(c => c.id === state.activeTurn);
  let nextIdx = (idx + 1) % state.combatants.length;
  if (idx === -1) nextIdx = 0;
  if (idx >= 0 && nextIdx === 0) state.round++;
  state.activeTurn = state.combatants[nextIdx].id;
  // Reset action economy on entering turn
  resetEconomy(state.combatants[nextIdx]);
  saveState();
  renderRoster();
}

function rollAllInitiative() {
  state.combatants.forEach(c => {
    const dexMod = abilityMod(c.abilities?.Dex ?? 10);
    const r = rollD20();
    c.initiative = r.value + dexMod;
    resetEconomy(c);
  });
  sortByInitiative();
  state.round = 1;
  saveState();
  renderRoster();
}

function clearTurn() { state.activeTurn = null; state.round = 1; saveState(); renderRoster(); }

function abilityMod(score) { return Math.floor(((score||10) - 10) / 2); }
function fmtMod(mod) { return (mod >= 0 ? '+' : '') + mod; }

function applyDamageManual(id) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  const v = parseInt(prompt('Damage amount (negative number to heal):'));
  if (isNaN(v)) return;
  c.hp.current = Math.max(0, Math.min(c.hp.max, c.hp.current - v));
  saveState();
  renderRoster();
}

function toggleExpanded(id) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  c.expanded = !c.expanded;
  saveState();
  renderRoster();
}

function addCondition(id, cond) {
  const c = state.combatants.find(x => x.id === id);
  if (!c || !cond) return;
  if (!c.conditions.includes(cond)) c.conditions.push(cond);
  saveState();
  renderRoster();
}

function removeCondition(id, cond) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  c.conditions = c.conditions.filter(x => x !== cond);
  saveState();
  renderRoster();
}

function rollBiteLocation(targetId) {
  const c = state.combatants.find(x => x.id === targetId);
  if (!c) return;
  const r = rollDie(4);
  const loc = BITE_LOCATIONS[r];
  c.infectionPoints = (c.infectionPoints || 0) + loc.pts;
  saveState();
  renderRoster();
  toast(`${c.name}: bit on ${loc.loc} (+${loc.pts} Infection). Total: ${c.infectionPoints}`);
  setLastRoll({ kind: 'misc', source: c.name + ' Bite Location', value: `${loc.loc} (+${loc.pts})` });
}

function promptBiteLocation() {
  if (state.combatants.length === 0) { toast('No combatants.'); return; }
  const opts = state.combatants.filter(c => c.type === 'pc' || c.type === 'npc').map(c =>
    `<button class="small" onclick="rollBiteLocation('${c.id}'); closeModal();" style="display:block; width:100%; text-align:left; margin-bottom:4px;">${escapeHtml(c.name)}</button>`
  ).join('');
  openModal(`<h2>Roll Bite Location</h2>
    <div class="muted small-text">Roll 1d4 to determine bite location and assign Infection Points (head 6, body 4, arm 3, leg 2).</div>
    <div style="margin-top:10px">${opts}</div>
    <div class="modal-actions"><button onclick="closeModal()">Cancel</button></div>`);
}

function renderRoster() {
  const t = document.getElementById('tab-roster');
  const turnInfo = state.activeTurn ?
    (() => {
      const c = state.combatants.find(x => x.id === state.activeTurn);
      return c ? `<span class="stat-pill"><span class="label">Round</span> ${state.round}</span>
        <span class="stat-pill" style="border-color:var(--success);color:var(--success)">▶ ${escapeHtml(c.name)}</span>` : '';
    })() : '';

  t.innerHTML = `
    <details class="card help-panel"><summary><strong>How to use this tab</strong> <span class="muted small-text">(click to expand)</span></summary>
      <div class="help-text">
        <p><strong>1.</strong> Add your players (<code>+ PC</code>) and any NPCs/walkers. Use <code>+ From Bestiary</code> to drop in walkers with their stat block already filled in.</p>
        <p><strong>2.</strong> Click <code>Roll All Init</code> when combat starts. The order sorts itself. Click <code>Next Turn ▶</code> (or press <kbd>Space</kbd>) to advance.</p>
        <p><strong>3.</strong> The current combatant's card highlights green. Their <strong>Action Economy</strong> pills appear below the header — click any pill to log <em>what they did</em> (e.g., "Shot at clicker") and mark it used. The pill shows a truncated label so you can see at a glance how the turn played out. Click again to edit or clear.</p>
        <p><strong>4.</strong> Need a <strong>readied / held action</strong>? Click the Action pill, check "Hold / Ready", and write the trigger condition. The pill turns yellow and the Reaction is reserved. When the trigger fires, click the Reaction pill → "Trigger It Now" to resolve. To discard the held action, choose "Discard Held Action" instead.</p>
        <p><strong>5.</strong> Click ▼ next to any name to expand their full sheet (abilities, conditions, weapons, notes).</p>
        <p><strong>6.</strong> When a walker bites a PC successfully and they fail their Con save, click <code>Bite Location Roll</code> to add Infection Points (only visible to you when "GM Fields" toggle is on at the top right).</p>
        <p><strong>7.</strong> The <em>Last Roll</em> bar at the bottom shows your most recent roll — click <code>Apply</code> to deduct damage from any target.</p>
      </div>
    </details>
    <div class="card">
      <div class="row spaced">
        <h2 style="margin:0">Initiative & Roster</h2>
        <div class="row tight">
          ${turnInfo}
          <button class="small" onclick="rollAllInitiative()" data-tip="Roll d20+Dex for every combatant and sort">Roll All Init</button>
          <button class="small" onclick="sortByInitiative()">Sort</button>
          <button class="small primary" onclick="nextTurn()">Next Turn ▶</button>
          <button class="small" onclick="clearTurn()">End Combat</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="row">
        <button class="small" onclick="addCombatant('pc')">+ PC</button>
        <button class="small" onclick="addCombatant('npc')">+ NPC</button>
        <button class="small" onclick="openBestiaryQuickAdd()">+ From Bestiary</button>
        <button class="small" onclick="promptBiteLocation()" data-tip="Roll d4 hit location and apply Infection Points">Bite Location Roll</button>
      </div>
    </div>
    <div class="grid-roster">${state.combatants.map(renderCombatant).join('') || '<div class="empty-state">No combatants yet. Add PCs, NPCs, or pull walkers from the Bestiary.</div>'}</div>
  `;
}

function renderCombatant(c) {
  const hpPct = Math.max(0, c.hp.current / c.hp.max * 100);
  const hpClass = hpPct < 25 ? 'critical' : (hpPct < 50 ? 'low' : '');
  const isActive = state.activeTurn === c.id;
  const isUnconscious = c.hp.current <= 0;
  const econ = c.economy || { action:false, bonus:false, reaction:false, interaction:false, moveUsed:0 };

  // Header
  const header = `
    <div class="combatant-header">
      <span class="combatant-toggle" onclick="toggleExpanded('${c.id}')">${c.expanded ? '▼' : '▶'}</span>
      <span class="stat-pill" data-tip="Initiative">
        <span class="label">INIT</span>
        <input type="number" class="tiny" value="${c.initiative}" onchange="updateCombatant('${c.id}','initiative',this.value); sortByInitiative()">
        <button class="roll" onclick="rollInitiativeFor('${c.id}')">⚂</button>
      </span>
      <span class="combatant-name"><input value="${escapeHtml(c.name)}" onchange="updateCombatant('${c.id}','name',this.value)"></span>
      <span class="stat-pill"><span class="label">HP</span>
        <input type="number" class="tiny" value="${c.hp.current}" onchange="updateCombatant('${c.id}','hp.current',this.value); renderRoster()">
        /
        <input type="number" class="tiny" value="${c.hp.max}" onchange="updateCombatant('${c.id}','hp.max',this.value); renderRoster()">
        <span class="hp-bar"><span class="fill ${hpClass}" style="width:${hpPct}%"></span></span>
      </span>
      <span class="stat-pill"><span class="label">AC</span>
        <input type="number" class="tiny" value="${c.ac}" onchange="updateCombatant('${c.id}','ac',this.value)">
      </span>
      <span class="stat-pill"><span class="label">SPD</span>
        <input type="number" class="tiny" value="${c.speed}" onchange="updateCombatant('${c.id}','speed',this.value)">
      </span>
      <button class="small" onclick="applyDamageManual('${c.id}')" data-tip="Manual damage/heal">±HP</button>
      <button class="small danger" onclick="if(event.shiftKey || confirm('Remove ${escapeHtml(c.name)}?')) removeCombatant('${c.id}')">×</button>
    </div>
    ${isActive ? renderEconomyBar(c, econ) : ''}
  `;

  // Body
  const isPC = c.type === 'pc';
  const abilities = ['Str','Dex','Con','Int','Wis','Cha'].map(a => `
    <label class="field" style="flex:1; min-width:60px">
      <span>${a} <span class="muted">(${fmtMod(abilityMod(c.abilities?.[a]))})</span></span>

              <input value="${escapeHtml(c.background||'')}" onchange="updateCombatant('${c.id}','background',this.value)">

            </label>
          </div>
          <div class="divider"></div>
          <h3>Ability Scores <span class="muted small-text">(modifier shown next to name)</span></h3>
          <div class="row tight">${abilities}</div>
        </div>
        <div>
          <h3>Tracks</h3>
          <div class="row">
            <span class="stat-pill" data-tip="Blood Points: at ≤4, Con save DC 15 every 10 min or paralyzed. At 0, paralyzed instantly."><span class="label">Blood</span>

            </span>
            <span class="stat-pill" data-tip="Insanity points accumulate from horror, isolation, witnessing trauma, etc."><span class="label">Insanity</span>
              <input type="number" class="tiny" value="${c.insanity ?? 0}" onchange="updateCombatant('${c.id}','insanity',this.value)">

        <div>

}

function renderEconomyBar(c, econ) {
  normalizeEconomy(c);
  const e = c.economy;
  const move = e.moveUsed || 0;
  const maxMove = c.speed || 0;

  function trunc(s, n) { return s.length > n ? s.substring(0,n) + '…' : s; }

  function pillFor(slotKey, displayName, defaultTip) {
    const slot = e[slotKey];
    const cls = slot.used ? 'econ-used' : 'econ-avail';
    let body = slot.used ? '✓ ' + displayName : displayName;
    if (slot.used && slot.label) body += ': ' + trunc(slot.label, 20);
    const tip = slot.used && slot.label ? (displayName + ': ' + slot.label) : defaultTip;
    return `<button class="econ-pill ${cls}" onclick="editEconomy('${c.id}','${slotKey}')" data-tip="${escapeHtml(tip)}">${escapeHtml(body)}</button>`;
  }

  // Action with held state
  let actionPill;
  if (e.action.held) {
    const triggerLabel = e.action.trigger ? trunc(e.action.trigger, 22) : '(no trigger set)';
    const tip = `HELD ACTION: ${e.action.label||'unspecified'}. Trigger: ${e.action.trigger||'unspecified'}. Click to trigger or discard via the Reaction pill.`;
    actionPill = `<button class="econ-pill econ-held" onclick="editEconomy('${c.id}','action')" data-tip="${escapeHtml(tip)}">⏸ HELD: ${escapeHtml(triggerLabel)}</button>`;
  } else {
    actionPill = pillFor('action', 'Action', 'Action: attack, dash, etc. Click to log description or hold/ready it.');
  }

  // Reaction shows reserved if action is held and reaction not yet used
  let reactionPill;
  if (e.action.held && !e.reaction.used) {
    reactionPill = `<button class="econ-pill econ-reserved" onclick="editEconomy('${c.id}','reaction')" data-tip="Reaction reserved by held action. Click to trigger the held action or discard it.">🔒 Reaction (held)</button>`;
  } else {
    reactionPill = pillFor('reaction', 'Reaction', 'Reaction: opportunity attack, triggering trap. Click to log.');
  }

  return `
    <div class="economy-bar">
      <span class="econ-label">ACTION ECONOMY:</span>
      ${actionPill}
      ${pillFor('bonus', 'Bonus', 'Bonus action: pump shotgun, draw weapon, pick up item, unarmed strike. Click to log.')}
      ${reactionPill}
      ${pillFor('interaction', 'Free', 'Free interaction: open door, brief speech (<6 sec). Click to log.')}
      <span class="econ-pill" data-tip="Movement used / total speed. Type to adjust.">
        <span style="margin-right:4px">Move</span>
        <input type="number" class="tiny" value="${move}" onchange="setMoveUsed('${c.id}', this.value); renderRoster()" style="width:36px"> / ${maxMove} ft
      </span>
      <button class="econ-pill" onclick="resetEconomyForId('${c.id}')" data-tip="Reset all action economy for this turn">↺ Reset</button>
    </div>
  `;
}

function resetEconomyForId(id) {
  const c = state.combatants.find(x => x.id === id);
  if (c) { resetEconomy(c); saveState(); renderRoster(); }
}

function renderEquippedWeapon(c, w, i) {
  const fa = getFirearm(w.firearmId);
  if (!fa) return '';
  const ammo = w.ammoLoaded || 'FMJ';
  return `
    <div style="background:var(--bg); border:1px solid var(--border); padding:6px 8px; margin-bottom:4px; border-radius:2px">
      <div class="row tight">
        <span class="firearm-type-${fa.type}" style="font-weight:bold">${escapeHtml(fa.name)}</span>
        <span class="muted small-text">${fa.damageDice}${fa.damageBonus>=0?'+':''}${fa.damageBonus}</span>
        <span class="stat-pill"><span class="label">MAG</span>
          <input type="number" class="tiny" value="${w.currentMag ?? fa.magSize}" onchange="(()=>{const c=state.combatants.find(x=>x.id==='${c.id}'); c.weapons[${i}].currentMag=parseInt(this.value)||0; saveState();})()">
          / ${fa.magSize}
        </span>
        <select onchange="(()=>{const c=state.combatants.find(x=>x.id==='${c.id}'); c.weapons[${i}].ammoLoaded=this.value; saveState();})()">
          ${Object.keys(AMMO_TYPES).map(k => `<option value="${k}" ${ammo===k?'selected':''}>${AMMO_TYPES[k].name}</option>`).join('')}
        </select>
        <button class="small" onclick="quickReload('${c.id}',${i})">Reload</button>
        <button class="small" onclick="loadFirearmIntoTab('${fa.id}','${c.id}')">→ Firearms Tab</button>
        <button class="small danger" onclick="(()=>{const c=state.combatants.find(x=>x.id==='${c.id}'); c.weapons.splice(${i},1); saveState(); renderRoster();})()">×</button>
      </div>
    </div>
  `;
}

function quickReload(combatantId, weaponIdx) {
  const c = state.combatants.find(x => x.id === combatantId);
  if (!c) return;
  const w = c.weapons[weaponIdx];
  const fa = getFirearm(w.firearmId);
  const cat = fa.ammoCat;
  const need = fa.magSize - (w.currentMag || 0);
  const have = c.ammo[cat] || 0;
  const take = Math.min(need, have);
  w.currentMag = (w.currentMag || 0) + take;
  c.ammo[cat] = have - take;
  saveState();
  renderRoster();
  toast(`Reloaded ${take} ${cat} round${take===1?'':'s'}`);
}

function openEquipFirearm(combatantId) {
  const all = getAllFirearms();
  const opts = all.map(f =>
    `<button class="small" style="display:block;width:100%;text-align:left;margin-bottom:3px" onclick="equipFirearm('${combatantId}','${f.id}'); closeModal();">
      <span class="firearm-type-${f.type}">${escapeHtml(f.name)}</span>
      <span class="muted"> — ${f.damageDice}${f.damageBonus>=0?'+':''}${f.damageBonus}, mag ${f.magSize}, ${FIREARM_TYPES[f.type].label}</span>
    </button>`
  ).join('');
  openModal(`<h2>Equip Firearm</h2>${opts}<div class="modal-actions"><button onclick="closeModal()">Cancel</button></div>`);
}

function equipFirearm(combatantId, firearmId) {
  const c = state.combatants.find(x => x.id === combatantId);
  if (!c) return;
  const fa = getFirearm(firearmId);
  c.weapons.push({ firearmId, currentMag: fa.magSize, ammoLoaded: 'FMJ' });
  saveState();
  renderRoster();
}

function openBestiaryQuickAdd() {
  const opts = BESTIARY_PRESETS.map(b =>
    `<button class="small" style="display:block;width:100%;text-align:left;margin-bottom:3px" onclick="addBestiaryCombatant('${b.id}'); closeModal();">
      <strong>${escapeHtml(b.name)}</strong> <span class="muted"> — AC ${b.ac}, HP ${b.hp}, Spd ${b.speed}</span>
    </button>`
  ).join('');
  openModal(`<h2>Add From Bestiary</h2>${opts}<div class="modal-actions"><button onclick="closeModal()">Cancel</button></div>`);
}

/* ============================================================
   FIREARMS LIBRARY
   ============================================================ */
function getAllFirearms() {
  return [...FIREARM_PRESETS, ...(state.customFirearms || [])];
}
function getFirearm(id) { return getAllFirearms().find(f => f.id === id); }

function loadFirearmIntoTab(firearmId, fromCombatantId) {
  state.uiSelectedFirearm = firearmId;
  if (fromCombatantId) state.uiFirearmShooter = fromCombatantId;
  saveState();
  document.querySelector('#tabs button[data-tab="firearms"]').click();
  renderFirearms();
}

function selectFirearm(id) {
  state.uiSelectedFirearm = id;
  saveState();
  renderFirearms();
}

function setFirearmFilter(f) { state.uiFirearmFilter = f; saveState(); renderFirearms(); }

function deleteCustomFirearm(id) {
  if (!confirm('Delete this custom firearm?')) return;
  state.customFirearms = (state.customFirearms || []).filter(f => f.id !== id);
  if (state.uiSelectedFirearm === id) state.uiSelectedFirearm = null;
  saveState();
  renderFirearms();
}

function openCustomFirearmEditor(existingId) {
  const f = existingId ? getFirearm(existingId) : null;
  const isEdit = !!f && (state.customFirearms||[]).find(x => x.id === existingId);
  const data = f ? JSON.parse(JSON.stringify(f)) : {
    id: 'c_' + uuid(), name: 'Custom Firearm', type: 'Handgun', ammoCat: 'Small',
    magSize: 6, range: '50/100', damageDice: '1d6', damageBonus: 0,
    properties: [], propValues: {}, reload: '1A → (full)', notes: '', isCustom: true
  };

  // Stash on window so save handler and prop checkbox handlers can mutate it
  window.faEditorData = data;

  const allProps = ['Automatic','Simple','Concealable','Forceful','Pump','Two-Handed','Weakening Range','Reliable','Makeshift','Custom','Light','Finesse'];
  const propsHtml = allProps.map(p => `
    <label class="inline" style="margin-right:10px">
      <input type="checkbox" ${data.properties.includes(p)?'checked':''} onchange="toggleFaProp('${p}', this.checked)"> ${p}
    </label>
  `).join('');

  openModal(`
    <h2>${isEdit ? 'Edit' : 'New'} Custom Firearm</h2>
    <div class="grid-2">
      <label class="field"><span>Name</span><input id="fa-name" value="${escapeHtml(data.name)}"></label>
      <label class="field"><span>Type</span>
        <select id="fa-type">${Object.keys(FIREARM_TYPES).map(t => `<option value="${t}" ${data.type===t?'selected':''}>${FIREARM_TYPES[t].label}</option>`).join('')}</select>
      </label>
      <label class="field"><span>Ammo Category</span>
        <select id="fa-ammoCat">
          ${['Small','Medium','Large','Shotgun','Rocket','Special'].map(a => `<option value="${a}" ${data.ammoCat===a?'selected':''}>${a}</option>`).join('')}
        </select>
      </label>
      <label class="field"><span>Mag Size</span><input type="number" id="fa-mag" value="${data.magSize}"></label>
      <label class="field"><span>Range (e.g., 80/150)</span><input id="fa-range" value="${data.range}"></label>
      <label class="field"><span>Damage Dice (e.g., 2d4)</span><input id="fa-dice" value="${data.damageDice}"></label>
      <label class="field"><span>Damage Bonus</span><input type="number" id="fa-bonus" value="${data.damageBonus}"></label>
      <label class="field"><span>Reload</span><input id="fa-reload" value="${escapeHtml(data.reload||'')}"></label>
    </div>
    <div style="margin-top:8px"><strong>Properties</strong></div>
    <div style="margin-top:4px">${propsHtml}</div>
    <div id="fa-propvals" style="margin-top:6px"></div>
    <label class="field" style="margin-top:8px"><span>Notes</span>
      <textarea id="fa-notes" style="width:100%;min-height:60px">${escapeHtml(data.notes||'')}</textarea>
    </label>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="saveCustomFirearm('${data.id}', ${isEdit})">Save</button>
    </div>
  `);

  renderFaPropValues();
}

function toggleFaProp(prop, checked) {
  const data = window.faEditorData;
  if (!data) return;
  if (checked) {
    if (!data.properties.includes(prop)) data.properties.push(prop);
  } else {
    data.properties = data.properties.filter(x => x !== prop);
    delete data.propValues[prop];
  }
  renderFaPropValues();
}

function renderFaPropValues() {
  const data = window.faEditorData;
  const host = document.getElementById('fa-propvals');
  if (!data || !host) return;
  const valued = ['Forceful', 'Weakening Range', 'Automatic', 'Splintering', 'Impalation'];
  const html = data.properties.filter(p => valued.includes(p)).map(p => {
    const safe = p.replace(/\s/g, '_');
    return `<label class="field" style="display:inline-flex;margin-right:8px"><span>${p} value</span>
      <input type="number" id="fa-pv-${safe}" value="${data.propValues[p] || 0}"></label>`;
  }).join('');
  host.innerHTML = html;
}

function saveCustomFirearm(id, isEdit) {
  const data = window.faEditorData;
  data.name = document.getElementById('fa-name').value;
  data.type = document.getElementById('fa-type').value;
  data.ammoCat = document.getElementById('fa-ammoCat').value;
  data.magSize = parseInt(document.getElementById('fa-mag').value)||1;
  data.range = document.getElementById('fa-range').value;
  data.damageDice = document.getElementById('fa-dice').value;
  data.damageBonus = parseInt(document.getElementById('fa-bonus').value)||0;
  data.reload = document.getElementById('fa-reload').value;
  data.notes = document.getElementById('fa-notes').value;
  // Property values
  ['Forceful','Weakening Range','Automatic','Splintering','Impalation'].forEach(p => {
    const el = document.getElementById('fa-pv-' + p.replace(/\s/g,'_'));
    if (el && data.properties.includes(p)) data.propValues[p] = parseInt(el.value)||0;
  });
  data.isCustom = true;
  state.customFirearms = state.customFirearms || [];
  if (isEdit) {
    const idx = state.customFirearms.findIndex(f => f.id === id);
    state.customFirearms[idx] = data;
  } else {
    state.customFirearms.push(data);
  }
  state.uiSelectedFirearm = data.id;
  saveState();
  closeModal();
  renderFirearms();
}

/* ============================================================
   FIREARMS TAB — render + roll engine
   ============================================================ */
function renderFirearms() {
  const t = document.getElementById('tab-firearms');
  const filter = state.uiFirearmFilter || 'all';
  const all = getAllFirearms();
  const filtered = filter === 'all' ? all : (filter === 'custom' ? all.filter(f=>f.isCustom) : all.filter(f => f.type === filter));

  const filterBtns = `
    <div class="lib-filter">
      ${['all','AR','SMG','Handgun','Shotgun','LongRifle','Martial','custom'].map(f => `
        <button class="${f===filter?'active':''}" onclick="setFirearmFilter('${f}')">${f==='all'?'All':(f==='custom'?'Custom':(FIREARM_TYPES[f]?.label||f))}</button>
      `).join('')}
    </div>`;

  const list = filtered.map(f => `
    <div class="lib-item ${state.uiSelectedFirearm===f.id?'selected':''}" onclick="selectFirearm('${f.id}')">
      <div class="lib-name firearm-type-${f.type}">${escapeHtml(f.name)}${f.isCustom?' <span class="muted small-text">[custom]</span>':''}</div>
      <div class="lib-meta">${FIREARM_TYPES[f.type]?.label||f.type} · ${f.damageDice}${f.damageBonus>=0?'+':''}${f.damageBonus} · mag ${f.magSize} · ${f.range}</div>
      <div>${f.properties.map(p => `<span class="prop-tag">${p}${f.propValues?.[p]?'('+f.propValues[p]+')':''}</span>`).join('')}</div>
    </div>
  `).join('');

  const sel = state.uiSelectedFirearm ? getFirearm(state.uiSelectedFirearm) : null;

  t.innerHTML = `
    <div class="grid-firearms">
      <div class="card">
        <h2>Firearm Library</h2>
        ${filterBtns}
        <div class="lib-list">${list || '<div class="empty-state">No firearms.</div>'}</div>
        <div class="divider"></div>
        <button class="small primary" onclick="openCustomFirearmEditor()">+ Add Custom</button>
      </div>
      <div>${sel ? renderFirearmRollPanel(sel) : '<div class="card empty-state">Select a firearm from the library to roll.</div>'}</div>
    </div>
  `;
}
