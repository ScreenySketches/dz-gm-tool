        <label class="field"><span>Target</span>
          <select id="fa-target">
            <option value="">(manual AC)</option>${targetOpts}
          </select>
        </label>
        <label class="field"><span>Target AC <span class="muted">(if manual)</span></span>
          <input type="number" id="fa-ac" value="10">
        </label>
        <label class="field"><span>Distance (ft)</span><input type="number" id="fa-dist" value="30"></label>
        <label class="field"><span>Ammo</span>
          <select id="fa-ammo">
            ${Object.keys(AMMO_TYPES).map(k => `<option value="${k}">${AMMO_TYPES[k].name} (PV ${AMMO_TYPES[k].pv})</option>`).join('')}
          </select>
        </label>
        <label class="field"><span>Advantage</span>
          <select id="fa-adv">
            <option value="normal">Normal</option>
            <option value="adv">Advantage</option>
            <option value="dis">Disadvantage</option>
          </select>
        </label>
        <label class="field"><span>Attack Bonus (prof+mod, etc.)</span><input type="number" id="fa-atkbonus" value="0"></label>
        <label class="field"><span>Reliable / Signature?</span>
          <select id="fa-reliable">
            <option value="0">No</option>
            <option value="1" ${fa.properties.includes('Reliable')||fa.properties.includes('Custom')?'selected':''}>Yes (no misfire on nat 1)</option>
          </select>
        </label>
        <label class="field"><span>Cover / Barriers ${tooltipIcon('Each material between shooter and target reduces ammo PV. Wood 1, Drywall 0.5, Glass 0.1, Metal 2, Concrete 3, Tempered Glass 3 per 3 inches.')}</span>
          <input id="fa-barriers" placeholder="e.g., wood,drywall">
        </label>
      </div>
    </div>

    <div class="card">
      <h2>Roll or Input</h2>
      <div class="row tight">
        <span>Attack roll (d20):</span>
        <input type="number" id="fa-d20" placeholder="—" class="small" style="width:60px">
        <button class="roll" onclick="rollD20Into('fa-d20', document.getElementById('fa-adv').value)">⚂ Roll d20</button>
        <span class="muted small-text">+ bonus = total (auto)</span>
      </div>
      <div class="row tight" style="margin-top:6px">
        <span>Damage roll (${fa.damageDice}${fa.damageBonus>=0?'+':''}${fa.damageBonus}):</span>
        <input type="number" id="fa-dmg" placeholder="—" class="small" style="width:60px">
        <button class="roll" onclick="rollDamageInto('fa-dmg', '${fa.damageDice}+${fa.damageBonus}')">⚂ Roll ${fa.damageDice}${fa.damageBonus>=0?'+':''}${fa.damageBonus}</button>
        <span class="muted small-text">crit doubles dice automatically</span>
      </div>
      ${fa.properties.includes('Automatic') ? `
      <div class="row tight" style="margin-top:6px; padding:8px; background:rgba(212,167,58,0.07); border:1px dashed var(--warn); border-radius:2px">
        <span data-tip="${escapeHtml(PROPERTY_INFO['Automatic'])}"><strong style="color:var(--warn)">Automatic</strong> burst — bullets to spend (max ${fa.propValues?.Automatic||fa.magSize}):</span>
        <input type="number" id="fa-burst" class="small" value="3" min="1" max="${fa.propValues?.Automatic||fa.magSize}">
        <button class="small primary" onclick="openBurstResolver('${fa.id}')" data-tip="Open the per-shot resolver. Roll each bullet's d20 and damage individually — the tool tracks disadvantage on first 5 and -2 cumulative penalty after misses.">Resolve Burst →</button>
      </div>
      <div class="muted small-text">For full burst control (disadv tracking, cascading -2, half-stop), use Resolve Burst. Single Resolve below treats this as one shot.</div>` : ''}
      ${fa.properties.includes('Forceful') ? `
      <div class="row tight" style="margin-top:6px; padding:6px; background:var(--bg); border:1px dashed var(--border-2)">
        <span data-tip="${escapeHtml(PROPERTY_INFO['Forceful'])}">Forceful (${fa.propValues?.Forceful}):</span>
        <button class="small" onclick="rollForcefulCheck('${fa.id}')">Check Disarm (1d6+${fa.propValues?.Forceful} vs prof+Str)</button>
      </div>` : ''}
      <div class="divider"></div>
      <div class="row">
        <button class="primary" onclick="resolveFirearmAttack('${fa.id}')">Resolve Attack</button>
        <button onclick="document.getElementById('fa-d20').value='';document.getElementById('fa-dmg').value=''">Clear</button>
      </div>
      <div id="fa-result"></div>
    </div>
  `;
}

function tooltipIcon(text) {
  return `<span class="help-ico" data-tip="${escapeHtml(text)}">?</span>`;
}

function rollD20Into(inputId, adv) {
  const r = rollD20(adv);
  document.getElementById(inputId).value = r.value;
  if (r.rolls) toast(`Rolled [${r.rolls.join(', ')}] → ${r.value} (${adv})`);
}

function rollDamageInto(inputId, notation) {
  const r = rollNotation(notation);
  if (r.error) { toast(r.error); return; }
  document.getElementById(inputId).value = r.total;
  toast(`Rolled [${r.rolls.join(', ')}]${r.bonus?(r.bonus>=0?'+':'')+r.bonus:''} = ${r.total}`);
}

function rollForcefulCheck(faId) {
  const fa = getFirearm(faId);
  const fv = fa.propValues?.Forceful || 0;
  const profStr = parseInt(prompt('Wielder\'s Proficiency Bonus + Str modifier:', '4'));
  if (isNaN(profStr)) return;
  const r = rollDie(6) + fv;
  const flies = r > profStr;
  const txt = `Forceful check: 1d6+${fv} = ${r} vs ${profStr} prof+Str → ${flies?'GUN FLIES OUT OF HANDS':'OK, kept grip'}`;
  toast(txt);
  setLastRoll({ kind: 'misc', source: fa.name+' Forceful', value: txt });
}

function resolveFirearmAttack(faId) {
  const fa = getFirearm(faId);
  const out = document.getElementById('fa-result');
  let attackRaw = parseInt(document.getElementById('fa-d20').value);
  let damageBase = parseInt(document.getElementById('fa-dmg').value);

  // Pre-check: shooter ammo
  const shooterId = document.getElementById('fa-shooter').value;
  let shooter = null, equipped = null;
  if (shooterId) {
    shooter = state.combatants.find(c => c.id === shooterId);
    if (shooter) equipped = shooter.weapons.find(w => w.firearmId === fa.id);
  }
  if (shooter && equipped && (equipped.currentMag || 0) <= 0) {
    out.innerHTML = `<div class="roll-result fail">
      <div class="total">NO AMMO — MISS</div>
      <div class="breakdown">${escapeHtml(shooter.name)}'s ${escapeHtml(fa.name)} mag is empty. The trigger clicks on nothing — the shot doesn't happen.</div>
      <div class="breakdown">Reload before firing: ${escapeHtml(fa.reload || '—')}.</div>
      <div class="narrative">${escapeHtml(shooter.name)} pulls the trigger but the chamber's empty. Nothing happens. ${escapeHtml(fa.name)} needs a reload.</div>
    </div>`;
    setLastRoll({ kind: 'misc', source: shooter.name + ' empty mag', value: 'no ammo' });
    return;
  }

  if (isNaN(attackRaw)) {
    out.innerHTML = '<div class="roll-result fail">Enter or roll an attack value first (the d20 result).</div>';
    return;
  }

  const ammoKey = document.getElementById('fa-ammo').value;
  const ammo = AMMO_TYPES[ammoKey];
  const dist = parseInt(document.getElementById('fa-dist').value)||0;
  const adv = document.getElementById('fa-adv').value;
  const atkBonus = parseInt(document.getElementById('fa-atkbonus').value)||0;
  const reliable = document.getElementById('fa-reliable').value === '1';
  const targetSel = document.getElementById('fa-target').value;
  const targetAcManual = parseInt(document.getElementById('fa-ac').value)||10;
  const target = targetSel ? state.combatants.find(c => c.id === targetSel) : null;
  let targetAC = target ? target.ac : targetAcManual;
  const targetName = target ? target.name : 'the target';

  const log = [];
  let crit = false, fail = false, misfire = false, hit = false;

  // Forceful penalty
  let attackTotal = attackRaw + atkBonus;
  const forcefulVal = (fa.propValues?.Forceful||0);
  if (forcefulVal) { attackTotal -= forcefulVal; log.push(`Forceful (${forcefulVal}) → -${forcefulVal} to hit`); }

  // AP ammo
  if (ammoKey === 'AP') {
    log.push('Armor Piercing: weapon becomes Forceful(2), bypasses worn armor');
    if (!fa.properties.includes('Forceful') || forcefulVal < 2) {
      attackTotal -= (2 - forcefulVal);
      log.push(`AP added Forceful(2) → -${2 - forcefulVal} additional to hit`);
    }
    if (target) {
      const dexMod = abilityMod(target.abilities?.Dex ?? 10);
      const natAc = 10 + dexMod;
      log.push(`Target Natural AC: 10 + ${fmtMod(dexMod)} = ${natAc}`);
      targetAC = natAc;
    } else {
      log.push('AP: vs Natural AC (10+Dex). Adjust manual AC if needed.');
    }
  }

  // PV vs barriers
  let pv = ammo.pv;
  let pvLost = 0;
  const barriers = (document.getElementById('fa-barriers').value||'').split(',').map(s=>s.trim()).filter(Boolean);
  barriers.forEach(b => {
    const key = Object.keys(MATERIAL_DURABILITY).find(k => k.toLowerCase() === b.toLowerCase());
    if (key) {
      pv -= MATERIAL_DURABILITY[key];
      log.push(`Barrier: ${key} (-${MATERIAL_DURABILITY[key]} PV)`);
    }
  });
  if (pv < ammo.pv) {
    pvLost = Math.max(0, ammo.pv - Math.max(0, pv));
    if (pv >= 0) {
      const ceilLost = Math.ceil(pvLost);
      attackTotal -= ceilLost;
      log.push(`PV reduced to ${pv.toFixed(1)} → -${ceilLost} attack/-${ceilLost} damage`);
    }
  }
  if (pv < 0) {
    out.innerHTML = `<div class="roll-result fail"><div class="total">PROJECTILE BLOCKED</div>
      <div class="breakdown">PV reduced below 0 by barriers (${ammo.pv} → ${pv.toFixed(1)}). Attack does not hit.</div>
      <div class="breakdown">${log.join(' · ')}</div>
      <div class="narrative">The bullet hits cover and stops cold before reaching ${escapeHtml(targetName)}.</div></div>`;
    return;
  }
  const halvedDmg = pv === 0;
  if (halvedDmg) log.push('PV at 0 → disadvantage on attack & half damage');

  // Range check
  const rangeStr = String(fa.range);
  const rangeMatch = rangeStr.match(/^(\d+)(?:\/(\d+))?$/);
  let normalRange = parseInt(rangeMatch?.[1])||0, maxRange = parseInt(rangeMatch?.[2])||normalRange;
  if (ammoKey === 'HollowPoint') { normalRange -= 10; maxRange -= 10; log.push('Hollow Point: range -10 ft'); }
  if (dist > maxRange) {
    out.innerHTML = `<div class="roll-result fail"><div class="total">OUT OF RANGE</div>
      <div class="breakdown">Target at ${dist} ft, max range ${maxRange} ft.</div>
      <div class="narrative">${escapeHtml(targetName)} is too far for ${escapeHtml(fa.name)} to reach.</div></div>`;
    return;
  }
  if (normalRange && dist > normalRange) log.push(`Beyond normal range (${normalRange}) — apply disadvantage if not already`);

  // Misfire on nat 1
  if (attackRaw === 1 && !reliable && !fa.properties.includes('Reliable') && !fa.properties.includes('Custom')) {
    misfire = true;
    fail = true;
    const sev = rollDie(3);
    let sevText = '';
    if (sev === 1) {
      const broken = rollDie(10);
      sevText = `SEVERITY 1 — Something broke. Mechanical check vs DC ${10+broken}; (${broken} - Mech mod) minutes to fix. Ammo wasted.`;
    } else if (sev === 2) {
      sevText = `SEVERITY 2 — Bullet jammed. 1 action to clear. Ammo wasted.`;
    } else {
      sevText = `SEVERITY 3 — Loud fire, bullet falls to ground. Ammo wasted.`;
    }
    log.push('NAT 1 → MISFIRE: ' + sevText);
  }

  // Crit on nat 20
  if (attackRaw === 20) { crit = true; log.push('NAT 20 → CRITICAL HIT (damage dice doubled)'); }

  if (!misfire) hit = (attackRaw === 20) || (attackTotal >= targetAC);

  let resultClass = 'roll-result';
  if (misfire) resultClass += ' fail';
  else if (crit) resultClass += ' crit';
  else if (!hit) resultClass += ' warn';

  let damageFinal = damageBase;
  let damageBreakdown = [];
  let damageType = 'ballistic';

  if (hit && !isNaN(damageBase)) {
    if (crit) {
      const extraRoll = rollNotation(fa.damageDice);
      damageFinal += extraRoll.total - (extraRoll.bonus || 0);
      damageBreakdown.push(`Crit dice +${extraRoll.total - (extraRoll.bonus||0)} (rolled ${extraRoll.rolls.join(',')})`);
    }
    const weak = fa.propValues?.['Weakening Range'];
    if (weak && dist > 0) {
      const inc = Math.floor(dist / weak);
      if (inc > 0) {
        const m = String(fa.damageDice).match(/(\d+)d(\d+)/);
        if (m) {
          const dieAvg = (parseInt(m[2])+1)/2;
          const lose = Math.min(parseInt(m[1]), inc);
          const reduction = Math.round(lose * dieAvg);
          damageFinal -= reduction;
          damageBreakdown.push(`Weakening Range: -${lose} damage die avg (-${reduction})`);
        }
      }
    }
    if (ammoKey === 'HollowPoint') {
      const m = String(fa.damageDice).match(/(\d+)d(\d+)/);
      const numDice = m ? parseInt(m[1]) : 1;
      if (targetAC < 15) {
        damageFinal += numDice;
        damageBreakdown.push(`Hollow Point: +${numDice} damage (AC < 15)`);
      } else if (targetAC >= 20) {
        damageFinal = 0;
        damageBreakdown.push('Hollow Point: target AC ≥ 20 → IMMUNE');
      } else {
        damageFinal = Math.floor(damageFinal / 2);
        damageBreakdown.push('Hollow Point: target AC ≥ 15 → resistant (½ damage)');
      }
    }
    if (ammoKey === 'Incendiary') {
      const fire = Math.floor(damageFinal / 2);
      const pierce = damageFinal - fire;
      damageBreakdown.push(`Incendiary: ${fire} fire + ${pierce} piercing (flammable target ignites: 1d6/turn)`);
      damageType = `${fire} fire + ${pierce} piercing`;
    }
    if (pvLost > 0 && pv > 0) {
      const ceilLost = Math.ceil(pvLost);
      damageFinal -= ceilLost;
      damageBreakdown.push(`PV reduction: -${ceilLost} damage`);
    }
    if (halvedDmg) { damageFinal = Math.floor(damageFinal / 2); damageBreakdown.push('PV at 0: damage halved'); }
    damageFinal = Math.max(0, damageFinal);
  }

  // Narrative generation
  let narrative;
  if (misfire) {
    const sevType = log.find(l=>l.startsWith('NAT 1'))||'';
    narrative = `${escapeHtml(fa.name)} jams. The trigger pulls but the weapon fails — see severity below before the next shot.`;
  } else if (!hit) {
    const margin = targetAC - attackTotal;
    narrative = `The shot misses ${escapeHtml(targetName)} by ${margin} (rolled ${attackTotal} vs AC ${targetAC}).`;
  } else if (crit) {
    narrative = `Critical hit! ${escapeHtml(fa.name)} tears into ${escapeHtml(targetName)} for ${damageFinal} ${damageType} damage — dice doubled.`;
  } else {
    narrative = `Hit. ${escapeHtml(fa.name)} strikes ${escapeHtml(targetName)} for ${damageFinal} ${damageType} damage.`;
  }
  // Bleed warning narrative addition
  if (hit && target && !isNaN(damageBase)) {
    if (crit || damageFinal > target.hp.max/2 || (target.hp.current - damageFinal) < 5) {
      narrative += ` ${escapeHtml(targetName)} may gain Bleeding (apply manually).`;
    }
    if ((target.hp.current - damageFinal) <= 0) {
      narrative += ` ${escapeHtml(targetName)} drops.`;
    }
  }

  let summaryHtml;
  if (misfire) {
    summaryHtml = `<div class="total">MISFIRE</div><div class="breakdown">${log.filter(l => l.startsWith('NAT 1')).join('; ')}</div>`;
  } else if (!hit) {
    summaryHtml = `<div class="total">MISS</div><div class="breakdown">Roll ${attackRaw}${attackBonusBreakdown(atkBonus, forcefulVal, ammoKey, pvLost)} = ${attackTotal} vs AC ${targetAC}</div>`;
  } else {
    summaryHtml = `<div class="total">${crit?'CRITICAL HIT':'HIT'} ${isNaN(damageBase)?'':`— ${damageFinal} damage`}</div>
      <div class="breakdown">Roll ${attackRaw}${attackBonusBreakdown(atkBonus, forcefulVal, ammoKey, pvLost)} = ${attackTotal} vs AC ${targetAC}</div>
      ${damageBreakdown.length ? `<div class="breakdown">${damageBreakdown.join(' · ')}</div>` : ''}`;
  }

  // Auto ammo deduction (single shot — burst handled separately)
  let burst = 1;
  if (fa.properties.includes('Automatic')) burst = parseInt(document.getElementById('fa-burst')?.value)||1;
  if (shooter && equipped) {
    const before = equipped.currentMag;
    equipped.currentMag = Math.max(0, equipped.currentMag - burst);
    log.push(`${shooter.name} ammo: ${before} → ${equipped.currentMag}`);
  }

  out.innerHTML = `<div class="${resultClass}">${summaryHtml}
    <div class="breakdown">${log.join(' · ')}</div>
    ${hit && !isNaN(damageBase) && target ? `<div style="margin-top:6px"><button class="primary small" onclick="applyDamageToCombatant('${target.id}', ${damageFinal})">Apply ${damageFinal} dmg to ${escapeHtml(target.name)}</button></div>` : ''}
    ${target && hit && fa.type==='Shotgun' && damageBase!=null ? `<div class="breakdown" style="color:var(--warn)">Shotgun cone: prompt all in cone for Dex save (DC = damage roll); half on success.</div>` : ''}
    <div class="narrative">${narrative}</div>
  </div>`;

  setLastRoll({
    kind: 'attack',
    source: fa.name,
    attack: attackTotal,
    crit, misfire,
    damage: hit ? damageFinal : null,
    damageType
  });
  saveState();
  renderRoster();
}

function attackBonusBreakdown(atkBonus, forceful, ammoKey, pvLost) {
  const parts = [];
  if (atkBonus) parts.push((atkBonus>=0?'+':'')+atkBonus+' bonus');
  if (forceful) parts.push('-'+forceful+' Forceful');
  if (ammoKey === 'AP' && forceful < 2) parts.push('-'+(2-forceful)+' AP');
  if (pvLost > 0) parts.push('-'+Math.ceil(pvLost)+' PV');
  return parts.length ? ' (' + parts.join(', ') + ')' : '';
}

function applyDamageToCombatant(id, dmg) {
  const c = state.combatants.find(x => x.id === id);
  if (!c) return;
  c.hp.current = Math.max(0, c.hp.current - dmg);
  saveState();
  renderRoster();
  toast(`Applied ${dmg} damage to ${c.name}`);
}

/* ============================================================
   AUTOMATIC BURST RESOLVER
   Per rulebook: spend N bullets; first 5 attacks have disadvantage;
   any miss AFTER the first 5 imposes a cumulative -2 to remaining shots;
   max bullets = number in (parenthesis); proficient wielder may stop
   halfway through. Can only use once every other turn.
   ============================================================ */
function openBurstResolver(faId) {
  const fa = getFirearm(faId);
  if (!fa) return;
  const burstSize = Math.max(1, parseInt(document.getElementById('fa-burst')?.value) || 1);
  const maxBurst = fa.propValues?.Automatic || fa.magSize;
  if (burstSize > maxBurst) { toast(`Max burst is ${maxBurst}`); return; }

  // Validate ammo if shooter selected
  const shooterId = document.getElementById('fa-shooter')?.value;
  const shooter = shooterId ? state.combatants.find(c => c.id === shooterId) : null;
  const equipped = shooter ? shooter.weapons.find(w => w.firearmId === fa.id) : null;
  if (shooter && equipped && (equipped.currentMag||0) < burstSize) {
    toast(`Not enough ammo: mag has ${equipped.currentMag||0}, burst needs ${burstSize}`);
    return;
  }
  if (shooter && shooter.autoUsedThisTurn) {
    if (!confirm(`${shooter.name} already used Automatic this turn. (Rule: once every other turn.) Continue anyway?`)) return;
  }

  // Initialize burst state
  state.burstState = {
    faId,
    shooterId: shooterId || null,
    targetId: document.getElementById('fa-target')?.value || null,
    targetAcManual: parseInt(document.getElementById('fa-ac')?.value)||10,
    distance: parseInt(document.getElementById('fa-dist')?.value)||0,
    ammoKey: document.getElementById('fa-ammo')?.value || 'FMJ',
    atkBonus: parseInt(document.getElementById('fa-atkbonus')?.value)||0,
    reliable: document.getElementById('fa-reliable')?.value === '1',
    barriers: document.getElementById('fa-barriers')?.value || '',
    burstSize,
    shots: Array.from({length: burstSize}, () => ({ d20: null, dmg: null, hit: null, crit: false, misfire: false, missAfter5: false }))
  };
  saveState();
  renderBurstResolver();
}

function renderBurstResolver() {
  const bs = state.burstState;
  if (!bs) return;
  const fa = getFirearm(bs.faId);
  const target = bs.targetId ? state.combatants.find(c => c.id === bs.targetId) : null;
  const shooter = bs.shooterId ? state.combatants.find(c => c.id === bs.shooterId) : null;
  let targetAC = target ? target.ac : bs.targetAcManual;
  if (bs.ammoKey === 'AP' && target) {
    const dexMod = abilityMod(target.abilities?.Dex ?? 10);
    targetAC = 10 + dexMod;
  }

  // Compute running miss penalty for any shots beyond shot 5
  const runningPenalty = (idx) => {
    let p = 0;
    for (let i = 5; i < idx; i++) {
      const s = bs.shots[i];
      if (s && s.hit === false && !s.misfire) p += 2;
    }
    return p;
  };

  const halfPoint = Math.ceil(bs.burstSize / 2);

  const rows = bs.shots.map((s, i) => {
    const shotNum = i + 1;
    const isDisadv = i < 5;
    const penalty = runningPenalty(i);
    const cls = s.hit === true ? 'hit' : (s.hit === false ? 'miss' : (isDisadv ? 'disadv' : ''));
    const tags = [];
    if (isDisadv) tags.push('<span class="shot-tag disadv">disadv (1st 5)</span>');
    if (penalty > 0) tags.push(`<span class="shot-tag penalty">-${penalty}</span>`);
    return `
      <div class="burst-row ${cls}">
        <span class="shot-num">Shot ${shotNum}</span>
        ${tags.join(' ')}
        <span>d20:</span>
        <input type="number" class="tiny" value="${s.d20 ?? ''}" onchange="setBurstShot(${i}, 'd20', this.value)">
        <button class="roll" onclick="rollBurstD20(${i}, ${isDisadv})">⚂</button>
        <span>dmg:</span>
        <input type="number" class="tiny" value="${s.dmg ?? ''}" onchange="setBurstShot(${i}, 'dmg', this.value)">
        <button class="roll" onclick="rollBurstDmg(${i})">⚂</button>
        ${s.hit !== null ? `<span style="margin-left:auto;color:${s.hit?'var(--success)':'var(--danger)'}; font-weight:bold">${s.misfire ? 'MISFIRE' : (s.crit ? 'CRIT' : (s.hit ? 'HIT' : 'MISS'))}</span>` : ''}
      </div>
    `;
  }).join('');

  const totalDmg = bs.shots.reduce((sum, s) => sum + (s.hit ? (s.dmg||0) : 0), 0);
  const hitsCount = bs.shots.filter(s => s.hit === true).length;
  const resolvedCount = bs.shots.filter(s => s.hit !== null).length;

  openModal(`
    <h2>Automatic Burst — ${escapeHtml(fa.name)} ${shooter ? `(${escapeHtml(shooter.name)})` : ''}</h2>
    <div class="muted small-text">
      Spending <strong>${bs.burstSize}</strong> bullets vs ${escapeHtml(target ? target.name : 'manual AC ' + targetAC)} (AC ${targetAC}) at ${bs.distance} ft.
      <br>Roll each shot's d20 and damage. The first 5 shots have disadvantage. After shot 5, each <strong>miss</strong> adds -2 to all remaining shots (cumulative).
      ${bs.burstSize > halfPoint ? `<br>If proficient, you may stop after shot ${halfPoint} (half-point).` : ''}
    </div>
    <div style="margin-top:10px">${rows}</div>
    <div class="row" style="margin-top:10px; padding-top:8px; border-top:1px solid var(--border)">
      <span class="muted">Total damage from hits: <strong style="color:var(--accent-2)">${totalDmg}</strong> (${hitsCount}/${resolvedCount} hit)</span>
    </div>
    <div class="modal-actions">
      <button onclick="cancelBurst()">Cancel</button>
      <button class="primary" onclick="finalizeBurst()">Finalize Burst${target ? ` & Apply to ${escapeHtml(target.name)}` : ''}</button>
    </div>
  `);
}

function setBurstShot(idx, key, val) {
  const bs = state.burstState;
  if (!bs) return;
  const s = bs.shots[idx];
  s[key] = val === '' ? null : (parseInt(val) || 0);
  evaluateBurstShot(idx);
  saveState();
  renderBurstResolver();
}

function rollBurstD20(idx, disadv) {
  const r = rollD20(disadv ? 'dis' : 'normal');
  const bs = state.burstState;
  bs.shots[idx].d20 = r.value;
  evaluateBurstShot(idx);
  saveState();
  renderBurstResolver();
  toast(disadv ? `Shot ${idx+1} (disadv): ${r.rolls.join('/')} → ${r.value}` : `Shot ${idx+1}: ${r.value}`);
}

function rollBurstDmg(idx) {
  const bs = state.burstState;
  const fa = getFirearm(bs.faId);
  const r = rollNotation(fa.damageDice + (fa.damageBonus>=0?'+':'') + fa.damageBonus);
  bs.shots[idx].dmg = r.total;
  evaluateBurstShot(idx);
  saveState();
  renderBurstResolver();
}

function evaluateBurstShot(idx) {
  const bs = state.burstState;
  const fa = getFirearm(bs.faId);
  const target = bs.targetId ? state.combatants.find(c => c.id === bs.targetId) : null;
  let targetAC = target ? target.ac : bs.targetAcManual;
  if (bs.ammoKey === 'AP' && target) targetAC = 10 + abilityMod(target.abilities?.Dex ?? 10);

  const s = bs.shots[idx];
  if (s.d20 === null) { s.hit = null; s.crit = false; s.misfire = false; return; }

  // Misfire
  if (s.d20 === 1 && !bs.reliable && !fa.properties.includes('Reliable') && !fa.properties.includes('Custom')) {
    s.misfire = true;
    s.hit = false;
    s.crit = false;
    return;
  }
  // Crit
  if (s.d20 === 20) { s.crit = true; s.hit = true; return; }
  // Calculate hit
  let total = s.d20 + bs.atkBonus;
  const forceful = fa.propValues?.Forceful || 0;
  total -= forceful;
  if (bs.ammoKey === 'AP' && forceful < 2) total -= (2 - forceful);
  // Running -2 from misses after shot 5
  let runningP = 0;
  for (let i = 5; i < idx; i++) {
    if (bs.shots[i].hit === false && !bs.shots[i].misfire) runningP += 2;
  }
  total -= runningP;
  s.hit = total >= targetAC;
  s.crit = false;
}

function cancelBurst() {
  state.burstState = null;
  saveState();
  closeModal();
}

function finalizeBurst() {
  const bs = state.burstState;
  if (!bs) return;
  const fa = getFirearm(bs.faId);
  const target = bs.targetId ? state.combatants.find(c => c.id === bs.targetId) : null;
  const shooter = bs.shooterId ? state.combatants.find(c => c.id === bs.shooterId) : null;

  // Sum hit damage; apply crit doubling
  let totalDmg = 0;
  let hitCount = 0, missCount = 0, misfireCount = 0, critCount = 0;
  bs.shots.forEach(s => {
    if (s.hit === null) return;
    if (s.misfire) misfireCount++;
    else if (s.crit) {
      critCount++;
      hitCount++;
      // Crit doubles damage dice. Player entered the damage; we double the dice portion.
      const r = rollNotation(fa.damageDice);
      totalDmg += (s.dmg || 0) + (r.total - (r.bonus||0));
    } else if (s.hit) {
      hitCount++;
      totalDmg += (s.dmg || 0);
    } else {
      missCount++;
    }
  });

  // Deduct ammo (full burst)
  let ammoSpent = bs.shots.filter(s => s.hit !== null).length;
  if (shooter) {
    const equipped = shooter.weapons.find(w => w.firearmId === fa.id);
    if (equipped) equipped.currentMag = Math.max(0, equipped.currentMag - ammoSpent);
    shooter.autoUsedThisTurn = true;
  }

  // Apply damage to target
  if (target && totalDmg > 0) {
    target.hp.current = Math.max(0, target.hp.current - totalDmg);
  }

  // Narrative
  let narrative;
  if (misfireCount > 0 && hitCount === 0) {
    narrative = `${escapeHtml(fa.name)} jams during the burst.`;
  } else if (hitCount === 0) {
    narrative = `${escapeHtml(shooter?.name||'The shooter')} unloads ${ammoSpent} rounds — none find their mark.`;
  } else {
    narrative = `${escapeHtml(shooter?.name||'The shooter')} fires a burst of ${ammoSpent}: ${hitCount} hit${hitCount>1?'s':''}${critCount?` (${critCount} crit)`:''}, ${missCount} miss${missCount===1?'':'es'}${misfireCount?`, ${misfireCount} misfire${misfireCount>1?'s':''}`:''}. ${target ? escapeHtml(target.name)+' takes '+totalDmg+' total damage.' : 'Total damage: '+totalDmg+'.'}`;
  }

  setLastRoll({
    kind: 'attack',
    source: fa.name + ' burst',
    attack: hitCount,
    crit: critCount > 0,
    misfire: misfireCount > 0,
    damage: totalDmg,
    damageType: 'ballistic'
  });

  // Output to fa-result panel
  const out = document.getElementById('fa-result');
  if (out) {
    out.innerHTML = `<div class="roll-result ${critCount?'crit':(hitCount?'':'warn')}">
      <div class="total">BURST: ${hitCount} hit${critCount?' (crit)':''} / ${missCount} miss${misfireCount?' / '+misfireCount+' misfire':''}</div>
      <div class="breakdown">Total damage dealt: ${totalDmg} · Ammo spent: ${ammoSpent}</div>
      <div class="narrative">${narrative}</div>
    </div>`;
  }

  state.burstState = null;
  saveState();
  closeModal();
  renderRoster();
  renderLastRoll();
  toast(`Burst: ${hitCount} hit, ${totalDmg} dmg`);
}

function toggleMeleeProp(prop, checked) {

}

function renderMeleePropValues() {
  const data = window.meleeEditorData;

  if (!data || !host) return;
  const valued = ['Splintering','Defensive','Versatile','Reach','Thrown'];
  const html = data.properties.filter(p => valued.includes(p)).map(p => {

  const data = window.meleeEditorData;
  data.name = document.getElementById('me-fa-name').value;
  data.category = document.getElementById('me-fa-cat').value;
  data.damageDice = document.getElementById('me-fa-dice').value;
  data.damageBonus = parseInt(document.getElementById('me-fa-bonus').value)||0;
  data.damageType = document.getElementById('me-fa-dtype').value;
  data.notes = document.getElementById('me-fa-notes').value;
  ['Splintering','Defensive','Versatile','Reach','Thrown'].forEach(p => {
    const el = document.getElementById('me-fa-pv-' + p.replace(/\s/g,'_'));

      data.propValues[p] = (p==='Splintering' || p==='Defensive') ? (parseInt(v)||0) : v;

  state.customMelee = state.customMelee || [];

    state.customMelee[idx] = data;
  } else {

  saveState();
  closeModal();
  renderMelee();

function rollMeleeDamage(meleeId) {

  if (v && v.value === '1' && m.propValues?.Versatile) dice = m.propValues.Versatile;

  const r = rollNotation(dice + (bonus>=0?'+':'') + bonus);
  if (r.error) { toast(r.error); return; }
  document.getElementById('me-dmg').value = r.total;
  toast(`Rolled [${r.rolls.join(',')}]${bonus?(bonus>=0?'+':'')+bonus:''} = ${r.total}`);
}

function resolveMelee(meleeId) {
  const m = getMelee(meleeId);
  const out = document.getElementById('me-result');
  const targetSel = document.getElementById('me-target').value;
  const targetAcManual = parseInt(document.getElementById('me-ac').value)||10;
  const target = targetSel ? state.combatants.find(c => c.id === targetSel) : null;
  const targetAC = target ? target.ac : targetAcManual;
  const targetName = target ? target.name : 'the target';
  const atkBonus = parseInt(document.getElementById('me-atkbonus').value)||0;
  const attackRaw = parseInt(document.getElementById('me-d20').value);
  let damageBase = parseInt(document.getElementById('me-dmg').value);

  if (isNaN(attackRaw)) {
    out.innerHTML = '<div class="roll-result fail">Enter or roll an attack value first (the d20).</div>';
    return;
  }

  const log = [];
  let crit = attackRaw === 20;
  let fail = attackRaw === 1;
  let hit = !fail && (crit || (attackRaw + atkBonus >= targetAC));

  // Crit doubles damage dice
  if (crit && !isNaN(damageBase)) {
    let dice = m.damageDice;
    const v = document.getElementById('me-versatile');
    if (v && v.value === '1' && m.propValues?.Versatile) dice = m.propValues.Versatile;
    const r = rollNotation(dice);
    if (!r.error) { damageBase += (r.total - (r.bonus||0)); log.push(`Crit dice +${r.total - (r.bonus||0)}`); }
  }

  // Severing
  if (hit && (m.properties||[]).includes('Severing')) {
    if (crit) log.push('Severing CRIT: target gains Bleeding regardless of AC.');
    else if ((attackRaw + atkBonus) >= targetAC + 5) log.push('Severing hit by 5+: target gains Bleeding 1 (or +1 level).');
  }
  // Splintering
  if (hit && (m.properties||[]).includes('Splintering')) {
    const thresh = m.propValues?.Splintering || 6;
    if (!isNaN(damageBase) && damageBase >= thresh) {
      log.push(`Splintering ${thresh}: weapon explodes. All within 5 ft → Dex save DC ${damageBase}, take ${damageBase} piercing on fail. Wielder Con save DC ${damageBase} or stunned (½ move) until end of next turn.`);
    }
  }
  // Impalation
  if (hit && (m.properties||[]).includes('Impalation')) {
    log.push(`Impalation: may leave weapon in target → ${m.damageDice} dmg start of their turn, 2d4 turns. Removal: bonus action + Str check vs DC 10 + atkr Str mod.`);
  }
  // Defensive
  if ((m.properties||[]).includes('Defensive')) {
    const defVal = m.propValues?.Defensive || 1;
    log.push(`Defensive (+${defVal}): wielder gains +${defVal} AC while held.`);
  }

  let cls = 'roll-result';
  if (fail) cls += ' fail';
  else if (crit) cls += ' crit';
  else if (!hit) cls += ' warn';

  // Narrative
  let narrative;
  if (fail) narrative = `Critical fail. The swing goes wide, leaving an opening.`;
  else if (!hit) {
    const margin = targetAC - (attackRaw + atkBonus);
    narrative = `The strike misses ${escapeHtml(targetName)} by ${margin}.`;
  } else if (crit) {
    narrative = `Critical hit! ${escapeHtml(m.name)} bites deep into ${escapeHtml(targetName)} for ${damageBase} ${m.damageType} damage.`;
  } else {
    narrative = `Hit. ${escapeHtml(m.name)} connects with ${escapeHtml(targetName)} for ${damageBase} ${m.damageType} damage.`;
  }
  // Bleed warning
  if (hit && target && !isNaN(damageBase) && (crit || damageBase > target.hp.max/2 || (target.hp.current - damageBase) < 5)) {
    narrative += ` ${escapeHtml(targetName)} may gain Bleeding (apply manually).`;
  }
  if (hit && target && (target.hp.current - damageBase) <= 0) narrative += ` ${escapeHtml(targetName)} drops.`;

  let html;
  if (fail) html = `<div class="total">CRITICAL FAIL</div><div class="breakdown">Attack misses; forfeit any other attacks granted by this action.</div>`;
  else if (!hit) html = `<div class="total">MISS</div><div class="breakdown">${attackRaw}+${atkBonus} = ${attackRaw+atkBonus} vs AC ${targetAC}</div>`;
  else html = `<div class="total">${crit?'CRITICAL HIT':'HIT'}${isNaN(damageBase)?'':' — '+damageBase+' '+m.damageType}</div>
      <div class="breakdown">${attackRaw}+${atkBonus} = ${attackRaw+atkBonus} vs AC ${targetAC}</div>
      ${log.length ? `<div class="breakdown">${log.join(' · ')}</div>` : ''}`;

  out.innerHTML = `<div class="${cls}">${html}
    ${hit && !isNaN(damageBase) && target ? `<div style="margin-top:6px"><button class="primary small" onclick="applyDamageToCombatant('${target.id}', ${damageBase})">Apply ${damageBase} dmg to ${escapeHtml(target.name)}</button></div>` : ''}
    <div class="narrative">${narrative}</div>
  </div>`;

  setLastRoll({ kind: 'attack', source: m.name, attack: attackRaw+atkBonus, crit, misfire: false, damage: hit ? damageBase : null, damageType: m.damageType });
}

          </label>

            <select id="dc-adv"><option value="normal">Normal</option><option value="adv">Advantage</option><option value="dis">Disadvantage</option></select>
          </label>
        </div>
      </div>
      <div class="card">

        <div class="row tight">
          <span>d20 result:</span>
          <input type="number" id="dc-d20" class="small">
          <button class="roll" onclick="rollD20Into('dc-d20', document.getElementById('dc-adv').value)">⚂ Roll d20</button>
        </div>
        <div class="divider"></div>
        <button class="primary" onclick="resolveDC()">Resolve</button>
        <div id="dc-result"></div>
      </div>
    </div>
    <div class="card">
      <h3>Common DCs <span class="muted small-text">(rough guide)</span></h3>
      <table class="ref-section" style="border:none">
        <tr><th>Trivial</th><td>5</td><th>Easy</th><td>10</td><th>Medium</th><td>13–15</td></tr>
        <tr><th>Hard</th><td>17</td><th>Very Hard</th><td>20</td><th>Heroic</th><td>25+</td></tr>
      </table>
    </div>
  `;
}

function resolveDC() {
  const skill = document.getElementById('dc-skill').value;
  const dc = parseInt(document.getElementById('dc-dc').value)||10;
  const mod = parseInt(document.getElementById('dc-mod').value)||0;
  const raw = parseInt(document.getElementById('dc-d20').value);
  const out = document.getElementById('dc-result');
  if (isNaN(raw)) { out.innerHTML = '<div class="roll-result fail">Enter or roll a d20 value first.</div>'; return; }
  const total = raw + mod;
  const success = total >= dc;
  const critFail = raw === 1;
  const critSucc = raw === 20;
  let cls = 'roll-result' + (critFail ? ' fail' : (success ? '' : ' warn'));
  if (critSucc) cls = 'roll-result crit';
  let label = success ? 'SUCCESS' : 'FAIL';
  if (critFail) label = 'CRITICAL FAIL';
  if (critSucc && success) label = 'CRITICAL SUCCESS';

  const rollerId = document.getElementById('dc-roller').value;
  const rollerName = rollerId ? (state.combatants.find(c=>c.id===rollerId)?.name||'') : '';
  const skillLabel = skill || 'check';
  const margin = Math.abs(dc - total);
  let narrative;
  if (critFail) narrative = `Catastrophic failure on the ${skillLabel.toLowerCase()}. ${rollerName?escapeHtml(rollerName)+' ':'The character '}rolls a natural 1 — the GM may add a complication.`;
  else if (critSucc && success) narrative = `Natural 20 on the ${skillLabel.toLowerCase()}! ${rollerName?escapeHtml(rollerName)+' ':''}succeeds spectacularly.`;
  else if (success) narrative = `${rollerName?escapeHtml(rollerName)+' ':'The character '}succeeds on the ${skillLabel.toLowerCase()} (${total} vs DC ${dc}, by ${margin}).`;
  else narrative = `${rollerName?escapeHtml(rollerName)+' ':'The character '}fails the ${skillLabel.toLowerCase()} (${total} vs DC ${dc}, short by ${margin}).`;

  out.innerHTML = `<div class="${cls}"><div class="total">${label} (${total} vs DC ${dc})</div>
    <div class="breakdown">${skill?skill+': ':''}${raw} + ${mod} = ${total}</div>
    ${critFail ? '<div class="breakdown" style="color:var(--danger)">Critical fail: attempt fails regardless of modifiers; GM may add a complication.</div>' : ''}
    <div class="narrative">${narrative}</div>
  </div>`;
  setLastRoll({ kind: 'check', source: (rollerName ? rollerName + ' ' : '') + (skill || 'Check'), value: total, dc, success });
}

function saveBestiaryEntry(id, isEdit) {
  const data = window.bestiaryEditorData;
  data.name = document.getElementById('be-name').value;
  data.ac = parseInt(document.getElementById('be-ac').value)||10;
  data.hp = parseInt(document.getElementById('be-hp').value)||10;
  data.speed = parseInt(document.getElementById('be-spd').value)||0;
  data.bite = {
    points: parseInt(document.getElementById('be-bp').value)||0,
    dc: parseInt(document.getElementById('be-bdc').value)||0,
    location: document.getElementById('be-bloc').value === '1'
  };
  data.notes = document.getElementById('be-notes').value;
  data.isCustom = true;
  state.customBestiary = state.customBestiary || [];
  if (isEdit) {
    const idx = state.customBestiary.findIndex(b => b.id === id);
    state.customBestiary[idx] = data;
  } else {
    state.customBestiary.push(data);
  }
  saveState();
  closeModal();
  renderBestiary();
  renderRoster(); // update bestiary quick-add list
}

function deleteBestiaryEntry(id) {
  if (!confirm('Delete this bestiary entry?')) return;
  state.customBestiary = (state.customBestiary || []).filter(b => b.id !== id);
  saveState();
  renderBestiary();
}

// Override: addBestiaryCombatant to use full library
function addBestiaryCombatant(presetId) {
  const p = getBestiaryEntry(presetId);
  if (!p) return;
  const existing = state.combatants.filter(c => c.name.startsWith(p.name)).length;
  const c = makeBlankCombatant('npc');
  c.name = p.name + (existing > 0 ? ' ' + (existing + 1) : '');
  c.hp = { current: p.hp, max: p.hp };
  c.ac = p.ac;
  c.speed = p.speed;
  c.notes = p.notes;
  c.bestiaryRef = p.id;
  c.expanded = false;
  state.combatants.push(c);
  saveState();
  renderRoster();
  toast('Added ' + c.name);
}

  const all = getAllBestiary();

function copyBestiaryToCustom(presetId) {
  const p = getBestiaryEntry(presetId);

  state.customBestiary = state.customBestiary || [];
  state.customBestiary.push(copy);
  saveState();
  renderBestiary();
  toast('Copied to custom — edit anytime.');

        <ul>
          <li>A+, B+, AB- → Standard Walker</li>
          <li>O+ → expels infection actively (Plague Shoot Zones)</li>
          <li>O- → Hybrid Walker (late-game horror reveal)</li>
        </ul>` },
    { id: 'haustol', title: 'HAUSTOL PATCH (medical item)', defaultHtml: `
        <div class="rule">Action to apply (self or adjacent). Restores 2d4+2 HP at start of target's next turn. Reduces Bleeding by 1 level (no Medicine check needed). One per short rest. Cannot stack with simultaneous First Aid Kit HP restoration.</div>
        <div class="muted small-text">GM note: derived from Leavening League's mycelial research. Recognizable by mycology-trained PCs.</div>` }
  ];
}

function renderReference() {
  const t = document.getElementById('tab-reference');
  const sections = getReferenceSections();
  state.referenceOverrides = state.referenceOverrides || {};

  const html = sections.map((s, i) => {
    const override = state.referenceOverrides[s.id];
    const body = override !== undefined ? override : s.defaultHtml;
    const isOverridden = override !== undefined;
    const titleColor = s.gmOnly ? 'var(--gm)' : '';
    const cls = s.gmOnly ? 'gm-only-block' : '';
    return `
      <details ${i===0?'open':''} class="${cls}" data-ref-id="${s.id}">
        <summary>
          <strong style="color:${titleColor}">${escapeHtml(s.title)}</strong>
          ${isOverridden ? ' <span class="muted small-text">(custom)</span>' : ''}
          <button class="small ref-edit-btn" onclick="event.stopPropagation(); event.preventDefault(); openReferenceEditor('${s.id}')" data-tip="Edit this section's text">Edit</button>
          ${isOverridden ? `<button class="small ref-edit-btn" style="margin-right:4px" onclick="event.stopPropagation(); event.preventDefault(); resetReferenceSection('${s.id}')" data-tip="Restore original text">Reset</button>` : ''}
        </summary>
        <div class="ref-section">${body}</div>
      </details>
    `;
  }).join('');

  t.innerHTML = `
    <details class="card help-panel" open><summary><strong>How to use this tab</strong> <span class="muted small-text">(click to expand)</span></summary>
      <div class="help-text">
        <p>Quick lookup for every rule in your D&Z rulebook, organized by topic. Click any section header to expand.</p>
        <p>Need to tweak a rule? Click the <code>Edit</code> button on any section to override its text — changes save with your campaign and persist across sessions. Click <code>Reset</code> to restore the original.</p>
        <p>The <span style="color:var(--gm)">[GM]</span> sections are hidden from players unless you toggle <strong>GM Fields</strong> on (top right).</p>
      </div>
    </details>
    <div class="card">
      <h2>Quick Reference</h2>
      <div class="muted small-text">All rules excerpted from your D&Z rulebook for quick lookup during play. Edit any section to fit your house rules.</div>
    </div>
    ${html}
  `;
}

function openReferenceEditor(sectionId) {
  const sections = getReferenceSections();
  const s = sections.find(x => x.id === sectionId);
  if (!s) return;
  const current = state.referenceOverrides?.[sectionId] !== undefined ? state.referenceOverrides[sectionId] : s.defaultHtml;
  openModal(`
    <h2>Edit Reference: ${escapeHtml(s.title)}</h2>
    <div class="muted small-text" style="margin-bottom:6px">
      Edit the section's HTML below. You can use <code>&lt;table&gt;</code>, <code>&lt;ul&gt;</code>, <code>&lt;ol&gt;</code>, <code>&lt;strong&gt;</code>, <code>&lt;h4&gt;</code>, and <code>&lt;div class="rule"&gt;</code> blocks.
      Click <strong>Reset to Default</strong> to revert. Changes save with your campaign data.
    </div>
    <textarea id="ref-edit-text" style="width:100%; min-height:300px; font-family:monospace; font-size:12px">${escapeHtml(current)}</textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="resetReferenceSection('${sectionId}'); closeModal();">Reset to Default</button>
      <button class="primary" onclick="saveReferenceOverride('${sectionId}')">Save</button>
    </div>
  `);
}

function saveReferenceOverride(sectionId) {
  const text = document.getElementById('ref-edit-text').value;
  state.referenceOverrides = state.referenceOverrides || {};
  state.referenceOverrides[sectionId] = text;
  saveState();
  closeModal();
  renderReference();
  toast('Reference section updated.');
}

function resetReferenceSection(sectionId) {
  if (state.referenceOverrides && state.referenceOverrides[sectionId] !== undefined) {
    delete state.referenceOverrides[sectionId];
    saveState();
    renderReference();
    toast('Restored default text.');
  }
}

/* ============================================================
   RENDER ALL & INIT
   ============================================================ */
function renderAll() {
  renderRoster();
  renderFirearms();
  renderMelee();
  renderDC();
  renderBestiary();
  renderReference();
  renderLastRoll();
}

(async function init() {
  // Load polyfill first
  const polyfill = document.createElement('script');
  polyfill.src = chrome.runtime?.getURL ? chrome.runtime.getURL('storage-polyfill.js') : 'storage-polyfill.js';
  polyfill.onload = () => {
    loadState();
    setupTabs();
    renderAll();
    // Keyboard shortcut: Space (when no input focused) → next turn
    document.addEventListener('keydown', e => {
      if (e.target.matches('input, textarea, select')) return;
      if (e.code === 'Space') {
        const activeTab = document.querySelector('#tabs button.active')?.dataset.tab;
        if (activeTab === 'roster') { e.preventDefault(); nextTurn(); }
      }
    });
  };
  document.head.appendChild(polyfill);
})();

</script>
</body>
</html>
